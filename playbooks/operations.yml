# ============================================================================
# Operations (L5) — Backup ZFS + Alerting Ntfy
# Usage : ansible-playbook -i inventory.ini playbooks/operations.yml
#
# Prerequis : L0-L4 deja executes.
# Idempotent : peut etre relance autant de fois que necessaire.
# ============================================================================
---

# ============================================================
# PLAY 1 — Operations Pi / Cerveau (L5)
# backup-zfs tourne sur le Pi (donnees ZFS + envoi chiffre vers VPS)
# alerting tourne sur le Pi (checks locaux → Ntfy sur le VPS)
# ============================================================
- name: "Opérations Cerveau (Pi) — L5"
  hosts: lan
  become: true
  gather_facts: false
  ignore_unreachable: true
  vars:
    alerting_check_zfs: true
    alerting_check_backup_vps: true
    alerting_check_backup_usb: true

  pre_tasks:
    - name: "Vérifier les variables critiques (Pi)"
      assert:
        that:
          - vault_pi_ssh_user is defined
          - vault_pi_ssh_port is defined
        fail_msg: "Variables Pi manquantes — vérifier group_vars/all.yml et host_vars/pi_serv.yml"
      tags: [always]

    - name: "Resoudre la connexion Pi"
      include_role:
        name: connection-resolver
      tags: [always]

    - name: "Resoudre l'IP de binding NetBird (Pi)"
      include_role:
        name: netbird-resolve
      tags: [always]

  roles:
    - role: backup-zfs
      tags: [layer5, backup-zfs]
    - role: image-maintenance
      tags: [layer5, image-maintenance]
    - role: alerting
      tags: [layer5, alerting]


# ============================================================
# PLAY 2 — Operations VPS / Sentinelle (L5)
# alerting uniquement (checks locaux → Ntfy local)
# ============================================================
- name: "Opérations Sentinelle (VPS) — L5"
  hosts: dmz
  become: true
  gather_facts: false
  ignore_unreachable: true

  pre_tasks:
    - name: "Vérifier les variables critiques (VPS)"
      assert:
        that:
          - vault_ssh_user is defined
          - vault_ssh_port is defined
        fail_msg: "Variables VPS manquantes — vérifier group_vars/all.yml et host_vars/vps_serv.yml"
      tags: [always]

    - name: "Resoudre la connexion VPS"
      include_role:
        name: connection-resolver
      tags: [always]

    - name: "Resoudre l'IP de binding NetBird (VPS)"
      include_role:
        name: netbird-resolve
      tags: [always]

  roles:
    - role: image-maintenance
      tags: [layer5, image-maintenance]
    - role: alerting
      tags: [layer5, alerting]
