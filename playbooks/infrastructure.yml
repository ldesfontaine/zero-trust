# ============================================================================
# Phase 1 — Infrastructure (socle + mesh)
# Usage : ansible-playbook -i inventory.ini playbooks/infrastructure.yml --ask-vault-pass
#
# Prérequis : L0 (bootstrap) déjà exécuté — user admin existant.
# Idempotent : peut être relancé autant de fois que nécessaire.
#
# Après ce playbook, mesh.domain.com est accessible → enrollment NetBird possible.
# ============================================================================
---

# Phase 1 — VPS
- name: "Infrastructure Sentinelle (VPS)"
  hosts: dmz
  become: true
  gather_facts: false
  ignore_unreachable: true
  pre_tasks:
    - include_role: { name: connection-resolver }
      tags: [always]
    - include_role: { name: netbird-client, tasks_from: resolve.yml }
      tags: [always]
  roles:
    - { role: common,         tags: [common] }
    - { role: base-vps,       tags: [base, hardening, nftables, ssh] }
    - { role: docker,         tags: [docker] }
    - { role: backbone,       tags: [backbone, traefik, netbird-server] }
    - { role: netbird-client, tags: [netbird-client] }

# Phase 1 — Pi
- name: "Infrastructure Cerveau (Pi)"
  hosts: lan
  become: true
  gather_facts: false
  ignore_unreachable: true
  pre_tasks:
    - include_role: { name: connection-resolver }
      tags: [always]
    - include_role: { name: netbird-client, tasks_from: resolve.yml }
      tags: [always]
  roles:
    - { role: common,         tags: [common] }
    - { role: base-pi,        tags: [base, hardening, ufw, ssh] }
    - { role: docker,         tags: [docker] }
    - { role: netbird-client, tags: [netbird-client] }
