# ============================================================================
# Infrastructure (L1-L3) — Système, hardening, Docker, réseau mesh
# Usage : ansible-playbook -i inventory.ini playbooks/infrastructure.yml
#
# Prérequis : L0 (bootstrap) déjà exécuté — user admin existant.
# Idempotent : peut être relancé autant de fois que nécessaire.
#
# Mode CI (depuis le VPS bastion) : -e ci_mode=true
#   - VPS : connection local (évite le loopback SSH qui casse au restart sshd)
#   - Pi  : ansible_host bascule sur vault_pi_netbird_ip (LAN injoignable)
# ============================================================================
---

# ============================================================
# PLAY 1 — Infrastructure VPS / Sentinelle (L1-L3)
# ============================================================
- name: "Infrastructure Sentinelle (VPS) — L1-L3"
  hosts: dmz
  become: true
  gather_facts: false
  ignore_unreachable: true
  vars:
    ansible_user: "{{ vault_ssh_user }}"
    ansible_port: 22
    ansible_ssh_private_key_file: "{{ priv_ssh_key_path }}"
    # CI : le VPS est le contrôleur → connection local (pas de SSH loopback)
    ansible_connection: "{{ 'local' if (ci_mode | default(false) | bool) else omit }}"

  pre_tasks:
    # En mode CI (local), pas besoin de sonder le port SSH
    - name: "Détecter le port SSH actif ({{ vault_ssh_port }} ou 22)"
      wait_for:
        host: "{{ ansible_host }}"
        port: "{{ vault_ssh_port }}"
        timeout: 5
      delegate_to: localhost
      ignore_errors: true
      register: ssh_port_hardened
      become: false
      when: not (ci_mode | default(false) | bool)
      tags: [always]

    - name: "Basculer sur le port SSH durci si disponible"
      set_fact:
        ansible_port: "{{ vault_ssh_port if not ssh_port_hardened.failed else 22 }}"
      when: not (ci_mode | default(false) | bool)
      tags: [always]

    - name: "Re-gather facts avec le bon port"
      setup:
      tags: [always]

  roles:
    - role: system-vps
      tags: [layer1, system-vps]
    - role: hardening-vps
      tags: [layer1, hardening-vps]
    - role: docker
      tags: [layer2, docker]
    - role: netbird-client
      tags: [layer3, netbird-client]


# ============================================================
# PLAY 2 — Infrastructure Pi / Cerveau (L1-L3)
# ============================================================
- name: "Infrastructure Cerveau (Pi) — L1-L3"
  hosts: lan
  become: true
  gather_facts: false
  ignore_unreachable: true
  vars:
    ansible_user: "{{ vault_pi_ssh_user }}"
    ansible_port: 22
    ansible_ssh_private_key_file: "{{ priv_ssh_key_path }}"
    # CI : le VPS atteint le Pi via NetBird (LAN 192.168.x.x injoignable)
    ansible_host: "{{ vault_pi_netbird_ip if (ci_mode | default(false) | bool) else omit }}"

  pre_tasks:
    - name: "Détecter le port SSH actif ({{ vault_pi_ssh_port }} ou 22)"
      wait_for:
        host: "{{ ansible_host }}"
        port: "{{ vault_pi_ssh_port }}"
        timeout: 5
      delegate_to: localhost
      ignore_errors: true
      register: ssh_port_hardened
      become: false
      tags: [always]

    - name: "Basculer sur le port SSH durci si disponible"
      set_fact:
        ansible_port: "{{ vault_pi_ssh_port if not ssh_port_hardened.failed else 22 }}"
      tags: [always]

    - name: "Re-gather facts avec le bon port"
      setup:
      tags: [always]

  roles:
    - role: system-pi
      tags: [layer1, system-pi]
    - role: hardening-pi
      tags: [layer1, hardening-pi]
    - role: docker
      tags: [layer2, docker]
    - role: netbird-client
      tags: [layer3, netbird-client]
    - role: netbird-dns
      tags: [layer3, netbird-dns]
      when: inventory_hostname in groups.get('dns_servers', [])
    - role: adguard-dns
      tags: [layer3, adguard-dns]
      when: inventory_hostname in groups.get('dns_servers', [])
    - role: netbird-acl
      tags: [layer3, netbird-acl]
      when: inventory_hostname in groups.get('dns_servers', [])
