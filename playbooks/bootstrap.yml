# ============================================================================
# Bootstrap (L0) — Création des utilisateurs admin sur machines vierges
# Usage : ansible-playbook -i inventory.ini playbooks/bootstrap.yml
#
# Ce playbook ne tourne qu'une fois (Run 0). Les runs suivants l'ignorent
# grâce à ignore_unreachable (root/admin ne sera plus accessible).
# ============================================================================
---

# ============================================================
# PLAY 1 — Bootstrap VPS (L0)
# ============================================================
- name: "Bootstrap VPS — Création de l'utilisateur admin"
  hosts: dmz
  become: true
  gather_facts: false
  ignore_unreachable: true
  vars:
    ansible_user: root
    ansible_password: "{{ vault_ssh_password }}"
    ansible_port: 22

  tasks:
    - name: "Bootstrap VPS : Vérifier les variables"
      ansible.builtin.assert:
        that:
          - vault_ssh_user is defined and vault_ssh_user | length > 0
          - vault_ssh_password is defined and vault_ssh_password | length > 0
          - vault_deploy_user is defined and vault_deploy_user | length > 0
          - deploy_repo_url is defined and deploy_repo_url | length > 0
          - deploy_repo_path is defined and deploy_repo_path | length > 0
        fail_msg: "Variables bootstrap manquantes — vérifier group_vars/all.yml et host_vars/"


    - name: "Bootstrap VPS : Création de l'utilisateur admin"
      ansible.builtin.user:
        name: "{{ vault_ssh_user }}"
        shell: /bin/bash
        groups: sudo
        append: true


    - name: "Bootstrap VPS : Sudo sans mot de passe pour l'admin"
      ansible.builtin.copy:
        content: "{{ vault_ssh_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ vault_ssh_user }}"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'


    - name: "Bootstrap VPS : Injection de la clé SSH publique"
      ansible.posix.authorized_key:
        user: "{{ vault_ssh_user }}"
        state: present
        key: "{{ lookup('file', ssh_key_path) }}"


    - name: "Bootstrap VPS : Création de l'utilisateur deploy (CI/CD)"
      ansible.builtin.user:
        name: "{{ vault_deploy_user }}"
        shell: /bin/bash
        # Groupe docker ajouté en L2 par le rôle docker (Docker pas encore installé ici)
        create_home: true


    - name: "Bootstrap VPS : Injection de la clé SSH deploy"
      ansible.posix.authorized_key:
        user: "{{ vault_deploy_user }}"
        state: present
        key: "{{ lookup('file', deploy_ssh_key_path) }}"


    - name: "Bootstrap VPS : Sudoers limité pour deploy (compose + git + ansible CI)"
      ansible.builtin.copy:
        content: |
          # Docker Compose v2 — commandes de déploiement uniquement
          {{ vault_deploy_user }} ALL=(ALL) NOPASSWD: /usr/bin/docker compose -f /opt/*/docker-compose.yml up -d *
          {{ vault_deploy_user }} ALL=(ALL) NOPASSWD: /usr/bin/docker compose -f /opt/*/docker-compose.yml pull *
          {{ vault_deploy_user }} ALL=(ALL) NOPASSWD: /usr/bin/docker compose -f /opt/*/docker-compose.yml down *
          {{ vault_deploy_user }} ALL=(ALL) NOPASSWD: /usr/bin/docker compose -f /opt/*/docker-compose.yml ps *
          # Ansible — uniquement les playbooks du repo déployé
          {{ vault_deploy_user }} ALL=(ALL) NOPASSWD: /usr/local/bin/ansible-playbook -i {{ deploy_repo_path }}/inventory.ini {{ deploy_repo_path }}/playbooks/*
          # Git — uniquement dans le repo déployé
          {{ vault_deploy_user }} ALL=(ALL) NOPASSWD: /usr/bin/git -C {{ deploy_repo_path }} *
        dest: "/etc/sudoers.d/{{ vault_deploy_user }}"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'


    - name: "Bootstrap VPS : Installer les prérequis Python"
      ansible.builtin.apt:
        name:
          - python3-pip
          - python3-venv
        state: present

    - name: "Bootstrap VPS : Installer Git"
      ansible.builtin.apt:
        name: git
        state: present


    - name: "Bootstrap VPS : Créer le venv Ansible dans /opt/ansible"
      ansible.builtin.command: python3 -m venv /opt/ansible
      args:
        creates: /opt/ansible/bin/python3


    - name: "Bootstrap VPS : Installer Ansible dans le venv système"
      ansible.builtin.pip:
        name: ansible
        state: present
        virtualenv: /opt/ansible


    - name: "Bootstrap VPS : Lien symbolique ansible → /usr/local/bin"
      ansible.builtin.file:
        src: "/opt/ansible/bin/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        state: link
      loop:
        - ansible-playbook
        - ansible-galaxy
        - ansible


    # version: main force un pull à chaque run — acceptable car bootstrap est one-shot (Run 0).
    # Le deploy workflow utilise git pull manuellement, pas ce module.
    - name: "Bootstrap VPS : Cloner le repo Ansible"
      ansible.builtin.git:
        repo: "{{ deploy_repo_url }}"
        dest: "{{ deploy_repo_path }}"
        version: main
      become_user: "{{ vault_deploy_user }}"


    - name: "Bootstrap VPS : Installer les collections Ansible"
      ansible.builtin.command: /usr/local/bin/ansible-galaxy collection install -r {{ deploy_repo_path }}/requirement.yml
      become_user: "{{ vault_deploy_user }}"
      args:
        creates: "/home/{{ vault_deploy_user }}/.ansible/collections"


# ============================================================
# PLAY 2 — Bootstrap Pi (L0)
# ============================================================
- name: "Bootstrap Pi — Création de l'utilisateur admin"
  hosts: lan
  become: true
  gather_facts: false
  ignore_unreachable: true
  vars:
    ansible_user: "{{ vault_pi_bootstrap_user }}"
    ansible_password: "{{ vault_pi_bootstrap_password }}"
    ansible_port: 22
    ansible_ssh_extra_args: "-o PreferredAuthentications=password -o PubkeyAuthentication=no"

  tasks:
    - name: "Bootstrap Pi : Vérifier les variables critiques"
      ansible.builtin.assert:
        that:
          - vault_pi_ssh_user is defined and vault_pi_ssh_user | length > 0
          - vault_pi_bootstrap_user is defined and vault_pi_bootstrap_user | length > 0
          - vault_pi_bootstrap_password is defined and vault_pi_bootstrap_password | length > 0
        fail_msg: "Variables bootstrap Pi manquantes — vérifier host_vars/pi_serv.yml"

    - name: "Bootstrap Pi : Création de l'utilisateur {{ vault_pi_ssh_user }}"
      ansible.builtin.user:
        name: "{{ vault_pi_ssh_user }}"
        shell: /bin/bash
        groups: sudo
        append: true

    - name: "Bootstrap Pi : Sudo sans mot de passe pour {{ vault_pi_ssh_user }}"
      ansible.builtin.copy:
        content: "{{ vault_pi_ssh_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ vault_pi_ssh_user }}"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    - name: "Bootstrap Pi : Injection de la clé SSH publique"
      ansible.posix.authorized_key:
        user: "{{ vault_pi_ssh_user }}"
        state: present
        key: "{{ lookup('file', ssh_key_path) }}"
