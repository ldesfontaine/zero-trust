# ============================================================
# Deploiement complet d'un noeud : infra + services.
# Utilise pour le premier deploiement ou une reconstruction totale.
#
# Play 1 : socle (base + docker) avec auto-detection du port SSH
# Play 2 : Traefik d'abord (reverse proxy), puis NetBird (mesh)
#           Traefik est deploye en premier car NetBird a besoin
#           du domaine mesh.* routable pour l'API (config + enrollment).
# Play 3 : services applicatifs — boucle sur machine_services
#           (traefik exclu car deja deploye au Play 2)
#           Reconnexion Traefik aux nouveaux reseaux a la fin.
# ============================================================

- name: "Infrastructure — socle commun a toutes les machines"
  hosts: all
  become: true
  gather_facts: false
  tags: [infra]

  # tags: [always] sur les pre_tasks : elles doivent tourner quel que soit
  # le --tags passe (la detection du port SSH et le gather_facts sont
  # necessaires avant toute task, y compris pour --tags docker ou --tags services).
  pre_tasks:
    - name: "Tester la connexion sur le port actuel"
      ansible.builtin.wait_for_connection:
        timeout: 5
      ignore_errors: true
      register: ssh_test
      tags: [always]

    - name: "Basculer sur le port durci si necessaire"
      ansible.builtin.set_fact:
        ansible_port: "{{ base_ssh_port }}"
      when: ssh_test is failed
      tags: [always]

    - name: "Collecter les facts manuellement"
      ansible.builtin.setup:
      tags: [always]

  roles:
    - role: base
      tags: [base]

    - role: docker
      tags: [docker]

- name: "Infrastructure — Traefik + NetBird (mesh)"
  hosts: all
  become: true
  tags: [infra]

  tasks:
    # Traefik en premier : NetBird a besoin du domaine routable
    # pour l'API (netbird_config + netbird_client enrollment).
    - name: "Deployer Traefik"
      ansible.builtin.include_role:
        name: traefik
      when: "'traefik' in machine_services"
      tags: [traefik]

    - name: "NetBird — Deployer le serveur (VPS uniquement)"
      ansible.builtin.include_role:
        name: netbird
        tasks_from: server.yml
        apply:
          tags: [netbird, netbird-server]
      when: machine_mesh.server | default(false)
      tags: [netbird, netbird-server]

    # Un restart Traefik (declenche si le compose ou la config change) deconnecte
    # tous les reseaux Docker du container. Les tasks suivantes (NetBird Config,
    # Client) passent par mesh.{{ base_domain }} → 504 tant que Traefik n'est
    # pas reconnecte a netbird-server-net. Idempotent.
    - name: "Traefik — Reconnecter a netbird-server-net (pre NetBird config)"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/_shared/tasks/traefik_reconnect_network.yml"
      vars:
        network_name: "netbird-server-net"
        traefik_container: "traefik-{{ traefik_mode }}"
      when:
        - machine_mesh.server | default(false)
        - "'traefik' in machine_services"
      tags: [traefik, netbird]

    - name: "NetBird — Configurer les groupes et ACLs"
      ansible.builtin.include_role:
        name: netbird
        tasks_from: config.yml
        apply:
          tags: [netbird, netbird-config]
      when: machine_mesh.server | default(false)
      tags: [netbird, netbird-config]

    - name: "NetBird — Enroller le noeud"
      ansible.builtin.include_role:
        name: netbird
        tasks_from: client/main.yml
        apply:
          tags: [netbird, netbird-client]
      when: machine_mesh.client | default(false)
      tags: [netbird, netbird-client]

    # CrowdSec APRES Traefik (dependance : volume traefik-<mode>-logs).
    # Engine et bouncer sont invoques separement pour permettre une Phase 1
    # d'observation (engine seul) avant d'activer le blocage (bouncer).
    # apply: propage les tags aux tasks incluses. Sans ca, `--tags crowdsec-*`
    # match le include mais aucune des tasks internes -> include vide.
    - name: "CrowdSec — Deployer l'Engine (detection, pas de blocage)"
      ansible.builtin.include_role:
        name: crowdsec
        tasks_from: engine.yml
        apply:
          tags: [crowdsec, crowdsec-engine]
      when: machine_crowdsec.engine | default(false)
      tags: [crowdsec, crowdsec-engine]

    - name: "CrowdSec — Installer le bouncer nftables (blocage effectif)"
      ansible.builtin.include_role:
        name: crowdsec
        tasks_from: bouncer.yml
        apply:
          tags: [crowdsec, crowdsec-bouncer]
      when: machine_crowdsec.bouncer | default(false)
      tags: [crowdsec, crowdsec-bouncer]

- name: "Services — deploiement modulaire"
  hosts: all
  become: true
  tags: [services]

  tasks:
    # Traefik est deja deploye au Play 2, on le skip ici.
    # Chaque service cree son propre reseau (<service>-net).
    # socket-proxy-net est cree par le role docker (socket_proxy.yml).
    - name: "Deployer chaque service assigne a cette machine"
      ansible.builtin.include_role:
        name: "{{ service_item }}"
      loop: "{{ machine_services | difference(['traefik']) }}"
      loop_control:
        loop_var: service_item

    # Connexion de Traefik aux reseaux de tous les services (machine_services
    # + traefik_extra_networks). Tous les reseaux existent a ce stade.
    - name: "Traefik — Connecter aux reseaux des services deployes"
      ansible.builtin.include_role:
        name: traefik
        tasks_from: connect_networks.yml
      when: "'traefik' in machine_services"
      tags: [traefik]
