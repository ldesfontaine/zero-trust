# ============================================================================
# Services applicatifs (L4) — Stacks Docker, CrowdSec
# Usage : ansible-playbook -i inventory.ini playbooks/services.yml
#
# Prerequis : L0-L3 (bootstrap + infrastructure) deja executes.
# Idempotent : peut etre relance autant de fois que necessaire.
# ============================================================================
---

# ============================================================
# PLAY 1 — Services VPS / Sentinelle (L4)
# ============================================================
- name: "Services Sentinelle (VPS) — L4"
  hosts: dmz
  become: true
  gather_facts: false
  ignore_unreachable: true

  pre_tasks:
    - name: "Vérifier les variables critiques (VPS)"
      assert:
        that:
          - vault_ssh_user is defined
          - vault_ssh_port is defined
        fail_msg: "Variables VPS manquantes — vérifier group_vars/all.yml et host_vars/vps_serv.yml"
      tags: [always]

    - name: "Resoudre la connexion VPS"
      include_role:
        name: connection-resolver
      tags: [always]

    - name: "Resoudre l'IP de binding NetBird (VPS)"
      include_role:
        name: netbird-resolve
      tags: [always]

  roles:
    - role: stack-vps
      tags: [layer4, stack-vps]
    - role: crowdsec-bouncer
      tags: [layer4, crowdsec-bouncer]


# ============================================================
# PLAY 2 — Services Pi / Cerveau (L4)
# ============================================================
- name: "Services Cerveau (Pi) — L4"
  hosts: lan
  become: true
  gather_facts: false
  ignore_unreachable: true

  pre_tasks:
    - name: "Vérifier les variables critiques (Pi)"
      assert:
        that:
          - vault_pi_ssh_user is defined
          - vault_pi_ssh_port is defined
          - host_netbird_ip is defined
        fail_msg: "Variables Pi manquantes — vérifier group_vars/all.yml et host_vars/pi_serv.yml"
      tags: [always]

    - name: "Resoudre la connexion Pi"
      include_role:
        name: connection-resolver
      tags: [always]

    - name: "Resoudre l'IP de binding NetBird (Pi)"
      include_role:
        name: netbird-resolve
      tags: [always]

  roles:
    - role: stack-pi
      tags: [layer4, stack-pi]
    - role: netbird-dns
      tags: [layer4, netbird-dns]
      when: inventory_hostname in groups.get('dns_servers', [])
    - role: adguard-dns
      tags: [layer4, adguard-dns]
      when: inventory_hostname in groups.get('dns_servers', [])
    - role: netbird-acl
      tags: [layer4, netbird-acl]
      when: inventory_hostname in groups.get('dns_servers', [])
    - role: veille-secu
      tags: [layer4, veille-secu]
    - role: bientot
      tags: [layer4, bientot]
