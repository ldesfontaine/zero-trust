# ============================================================================
# Phase 2 — Services (apps + backup + monitoring)
# Usage : ansible-playbook -i inventory.ini playbooks/services.yml --ask-vault-pass
#
# Prérequis : infrastructure.yml + enrollment NetBird effectué.
# Idempotent : peut être relancé autant de fois que nécessaire.
# ============================================================================
---

# Phase 2 — VPS
- name: "Services Sentinelle (VPS)"
  hosts: dmz
  become: true
  gather_facts: false
  ignore_unreachable: true
  pre_tasks:
    - name: "Pre-task : Résolution dynamique de la connexion SSH"
      ansible.builtin.include_role: { name: connection-resolver }
      tags: [always]
    - name: "Pre-task : Résolution IP NetBird"
      ansible.builtin.include_role: { name: netbird-client, tasks_from: resolve.yml }
      tags: [always]
  roles:
    - { role: services-vps, tags: [services, crowdsec, ntfy, bientot-agent] }
    - { role: monitoring, tags: [monitoring, grype] }

# Phase 2 — Pi
- name: "Services Cerveau (Pi)"
  hosts: lan
  become: true
  gather_facts: false
  ignore_unreachable: true
  pre_tasks:
    - name: "Pre-task : Résolution dynamique de la connexion SSH"
      ansible.builtin.include_role: { name: connection-resolver }
      tags: [always]
    - name: "Pre-task : Résolution IP NetBird"
      ansible.builtin.include_role: { name: netbird-client, tasks_from: resolve.yml }
      tags: [always]
  roles:
    - { role: services-pi, tags: [services, seafile, vaultwarden, immich, adguard, bientot, veille-secu, portfolio] }
    - { role: backup, tags: [backup, zfs] }
    - { role: monitoring, tags: [monitoring, grype] }
