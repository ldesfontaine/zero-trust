# ============================================================================
# Docker Engine — Installation depuis le dépôt officiel Docker
# Compatible amd64 (VPS) et arm64 (Pi)
# Doc : https://docs.docker.com/engine/install/
# ============================================================================
 
- name: Install Docker prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
 
- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
 
- name: Add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg | \
    gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
 
- name: Add Docker repository
  copy:
    content: |
      deb [arch={{ ansible_architecture | replace('x86_64','amd64') | replace('aarch64','arm64') }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable
    dest: /etc/apt/sources.list.d/docker.list
    mode: '0644'
 
- name: Update apt cache after adding Docker repo
  apt:
    update_cache: yes
 
- name: Install Docker Engine (latest stable)
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: latest
 
- name: Ensure Docker is started and enabled
  systemd:
    name: docker
    state: started
    enabled: yes
 
- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  
- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: Reset SSH connection pour appliquer le nouveau groupe docker
  meta: reset_connection