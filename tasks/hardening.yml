# ============================================================================
# Hardening SSH — VPS
#
# Run 1 : SSH tourne sur 22 → déploie sshd_config (port 2222) →
#         restart async (connexion encore sur 22) → wait_for port 2222 →
#         set_fact 2222 → ferme port 22
#
# Run 2+: SSH tourne déjà sur 2222 → même mécanique, idempotent
# ============================================================================
---
- name: Autoriser le port SSH final dans UFW
  ufw:
    rule: allow
    port: "{{ vault_ssh_port | string }}"
    proto: tcp
 
- name: Déploiement de la configuration SSH durcie
  template:
    src: templates/sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    validate: '/usr/sbin/sshd -t -f %s'
  vars:
    ssh_user: "{{ vault_ssh_user }}"
    ssh_port: "{{ vault_ssh_port }}"
 
# Restart async : connexion Ansible encore sur port 22
# → SSH redémarre sur vault_ssh_port sans couper Ansible
- name: Restart SSH (async — connexion encore sur port 22)
  systemd:
    name: sshd
    state: restarted
  async: 1
  poll: 0
  ignore_errors: true
 
# Attend depuis localhost que le nouveau port réponde
- name: Attendre que SSH soit disponible sur le nouveau port
  wait_for:
    host: "{{ ansible_host }}"
    port: "{{ vault_ssh_port }}"
    delay: 3
    timeout: 30
  delegate_to: localhost
  become: false
  
# Maintenant que le port est confirmé, Ansible bascule dessus
- name: Mise à jour du port SSH pour la session Ansible en cours
  set_fact:
    ansible_port: "{{ vault_ssh_port }}"
 
- name: Fermeture du port SSH bootstrap (22) dans UFW
  ufw:
    rule: allow
    port: "22"
    proto: tcp
    delete: yes