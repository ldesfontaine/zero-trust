# ============================================================================
# CrowdSec Firewall Bouncer — Installé sur l'HÔTE VPS (pas dans Docker)
# ============================================================================
---
- name: Add CrowdSec GPG key
  shell: |
    curl -fsSL https://packagecloud.io/crowdsec/crowdsec/gpgkey | \
    gpg --dearmor -o /etc/apt/keyrings/crowdsec_crowdsec-archive-keyring.gpg
  args:
    creates: /etc/apt/keyrings/crowdsec_crowdsec-archive-keyring.gpg

- name: Add CrowdSec repository
  copy:
    content: |
      deb [signed-by=/etc/apt/keyrings/crowdsec_crowdsec-archive-keyring.gpg] https://packagecloud.io/crowdsec/crowdsec/debian/ bookworm main
    dest: /etc/apt/sources.list.d/crowdsec_crowdsec.list
    mode: '0644'

- name: Update apt cache for CrowdSec
  apt:
    update_cache: yes
 
- name: Install CrowdSec Firewall Bouncer (nftables)
  apt:
    name: crowdsec-firewall-bouncer-nftables
    state: latest
 
- name: Wait for CrowdSec LAPI to be available
  wait_for:
    host: 127.0.0.1
    port: 8080
    timeout: 60
    delay: 5
 
- name: Deploy bouncer configuration
  template:
    src: templates/crowdsec-firewall-bouncer_yaml.j2
    dest: /etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml
    owner: root
    group: root
    mode: '0600'
  notify: Restart Bouncer
 
- name: Enable and start CrowdSec Firewall Bouncer
  systemd:
    name: crowdsec-firewall-bouncer
    state: started
    enabled: yes
 