# ============================================================================
# Système VPS — Mise à jour, outils, firewall
# Migration NPM → Traefik :
#   - Plus de port 49152:49200 (coturn supprimé)
#   - Port 33073 gardé pour backward compat gRPC NetBird
#   - Port 3478 UDP pour STUN NetBird
#   - Traefik gère 80/443 nativement
# ============================================================================
 
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
 
- name: Upgrade all packages to latest
  apt:
    upgrade: safe
  environment:
    NEEDRESTART_MODE: "a"   # auto-restart services sans prompt (évite le hang interactif)

# Reset la connexion SSH après l'upgrade : si openssh-server a été mis à jour,
# sshd a redémarré et le socket ControlMaster Ansible est périmé.
# Ce meta task force Ansible à se reconnecter proprement.
- name: Reset connexion SSH après apt upgrade (sshd potentiellement redémarré)
  meta: reset_connection

- name: Install base tools
  apt:
    name:
      - curl
      - ufw
      - python3-pip
      - git
      - nftables
      - gnupg
      - unattended-upgrades
      - apt-listchanges
    state: present
 
- name: Enable unattended-upgrades
  copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'
 
- name: Configure unattended-upgrades sources
  copy:
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}";
        "${distro_id}:${distro_codename}-security";
        "${distro_id}ESMApps:${distro_codename}-apps-security";
        "${distro_id}ESM:${distro_codename}-infra-security";
        "Docker:${distro_codename}";
      };
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: '0644'
 
# --- Firewall UFW VPS ---
- name: UFW - Allow SSH bootstrap (port 22)
  ufw:
    rule: allow
    port: "22"
    proto: tcp
 
- name: UFW - Allow HTTP (Traefik + Let's Encrypt challenge)
  ufw:
    rule: allow
    port: "80"
    proto: tcp
 
- name: UFW - Allow HTTPS (Traefik)
  ufw:
    rule: allow
    port: "443"
    proto: tcp
 
- name: UFW - Allow NetBird gRPC backward compat (33073)
  ufw:
    rule: allow
    port: "33073"
    proto: tcp
 
- name: UFW - Allow NetBird STUN (3478 UDP)
  ufw:
    rule: allow
    port: "3478"
    proto: udp
 
- name: UFW - Enable Firewall
  ufw:
    state: enabled
    policy: deny