---
# ============================================================================
# Handlers — Partagés VPS + Pi
# ============================================================================
 
- name: Restart SSH
  systemd:
    name: sshd
    state: restarted
 
- name: Restart Bouncer
  systemd:
    name: crowdsec-firewall-bouncer
    state: restarted
 
- name: Reload Docker Stack VPS
  shell: "cd {{ stack_dir }} && docker compose up -d --remove-orphans"

- name: Restart CrowdSec
  shell: "cd {{ stack_dir }} && docker compose restart crowdsec"
 
- name: Reload Docker Stack Pi
  shell: "cd {{ pi_stack_dir }} && docker compose up -d --remove-orphans"

- name: Restart AdGuard
  shell: "cd {{ pi_stack_dir }} && docker compose restart adguard"
 
- name: Apply sysctl
  shell: sysctl --system
 