# ============================================================================
# Inventory — Machines cibles
#
# Groupes par zone réseau, PAS par type de hardware.
# Si un jour tu ajoutes une 2e machine LAN, crée des sous-groupes
# fonctionnels pour éviter les doublons de rôles :
#
#   [storage]
#   pi_serv ...
#
#   [compute]
#   minipc_serv ...
#
#   [lan:children]
#   storage
#   compute
#
# Puis dans les playbooks, cible storage ou compute au lieu de lan.
#
# ansible_user / ansible_port = valeurs BOOTSTRAP (connexion initiale)
# Les plays suivants écrasent ces valeurs via vars: dans les playbooks.
# ============================================================================

[dmz]
vps_serv ansible_host=62.72.36.161 ansible_user=root ansible_port=22 ansible_python_interpreter=/usr/bin/python3

[lan]
pi_serv ansible_host=192.168.1.21 ansible_user=admin ansible_port=22 ansible_python_interpreter=/usr/bin/python3

# Sous-groupe fonctionnel : machines qui hébergent les services DNS/ACL
# Seul le Pi principal gère AdGuard DNS + NetBird DNS/ACL.
# Les futures machines LAN ne doivent PAS dupliquer ces rôles.
[dns_servers]
pi_serv
