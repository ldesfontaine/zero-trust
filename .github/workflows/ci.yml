name: CI - Lint & Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configurer Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Installer Ansible et Ansible-Lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Installer les collections requises
        run: ansible-galaxy collection install -r requirement.yml

      - name: Lancer ansible-lint
        run: ansible-lint .

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Configurer Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Installer Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Installer les collections requises
        run: ansible-galaxy collection install -r requirement.yml

      - name: Créer l'inventaire et le vault factices pour le syntax check
        run: |
          cp inventory.ini.example inventory.ini
          echo "dummy-vault-password" > /tmp/vault_pass

      - name: Vérifier la syntaxe des playbooks
        run: |
          ansible-playbook -i inventory.ini playbooks/infrastructure.yml --syntax-check --vault-password-file /tmp/vault_pass
          ansible-playbook -i inventory.ini playbooks/services.yml --syntax-check --vault-password-file /tmp/vault_pass
          ansible-playbook -i inventory.ini playbooks/mesh-config.yml --syntax-check --vault-password-file /tmp/vault_pass
