name: CI - Lint & Syntax Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer Ansible et Ansible-Lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Installer les collections requises
        run: ansible-galaxy collection install -r requirement.yml

      - name: Lancer ansible-lint
        run: ansible-lint .

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Installer les collections requises
        run: ansible-galaxy collection install -r requirement.yml

      - name: Créer l'inventaire et le vault factices pour le syntax check
        run: |
          cp inventory.ini.example inventory.ini
          echo "dummy-vault-password" > /tmp/vault_pass

      - name: Vérifier la syntaxe des playbooks
        run: ansible-playbook -i inventory.ini setup.yml --syntax-check --vault-password-file /tmp/vault_pass
