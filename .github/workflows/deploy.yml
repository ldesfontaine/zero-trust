# ============================================================================
# CD — Deploy manuel via GitHub Actions (workflow_dispatch)
#
# Flow : GitHub Runner → SSH VPS (bastion) → ansible-playbook sur le VPS
#        Le VPS relaye vers le LAN via NetBird si --limit inclut des machines LAN.
#
# Prérequis GitHub Secrets :
#   VPS_HOST            — IP publique du VPS
#   VPS_SSH_PORT        — Port SSH durci du VPS
#   SSH_PRIVATE_KEY     — Clé privée Ed25519 (user deploy)
#   ANSIBLE_VAULT_PASSWORD — Mot de passe ansible-vault
# ============================================================================
name: CD - Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: 'Playbook à exécuter'
        required: true
        default: 'setup.yml'
        type: choice
        options:
          - setup.yml
          - playbooks/bootstrap.yml
          - playbooks/infrastructure.yml
          - playbooks/services.yml
          - playbooks/operations.yml
      tags:
        description: 'Tags Ansible (vide = tout)'
        required: false
        default: ''
        type: string
      limit:
        description: 'Limit Ansible (vide = tout)'
        required: false
        default: ''
        type: string
      mode:
        description: 'Mode de déploiement'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - apply

jobs:
  deploy:
    name: "Déployer (${{ inputs.mode }})"
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Afficher les paramètres
        run: |
          echo "Playbook: ${{ inputs.playbook }}"
          echo "Tags: ${{ inputs.tags }}"
          echo "Limit: ${{ inputs.limit }}"
          echo "Mode: ${{ inputs.mode }}"

      - name: Valider les inputs (sécurité)
        env:
          INPUT_TAGS: ${{ inputs.tags }}
          INPUT_LIMIT: ${{ inputs.limit }}
        run: |
          # Bloquer les caractères dangereux dans les inputs libres
          if echo "$INPUT_TAGS" | grep -qP '[;&|`$(){}]'; then
            echo "::error::Tags contient des caractères interdits"
            exit 1
          fi
          if echo "$INPUT_LIMIT" | grep -qP '[;&|`$(){}]'; then
            echo "::error::Limit contient des caractères interdits"
            exit 1
          fi

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<SSHEOF
          Host vps-bastion
            HostName ${{ secrets.VPS_HOST }}
            Port ${{ secrets.VPS_SSH_PORT }}
            User deploy
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Déployer via le VPS (bastion)
        env:
          INPUT_PLAYBOOK: ${{ inputs.playbook }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_TAGS: ${{ inputs.tags }}
          INPUT_LIMIT: ${{ inputs.limit }}
          VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          # Créer le vault password à la volée sur le VPS, déployer, nettoyer
          CMD="echo '${VAULT_PASSWORD}' > ~/.vault_pass && chmod 600 ~/.vault_pass"
          CMD="$CMD && export PATH=\$HOME/.local/bin:\$PATH"
          CMD="$CMD && cd ~/deployVps && git pull origin main"
          # sudo : les plays VPS utilisent connection=local en CI,
          # Ansible doit tourner en root pour que become: true fonctionne
          CMD="$CMD && sudo \$HOME/.local/bin/ansible-playbook -i inventory.ini ${INPUT_PLAYBOOK}"
          # Paths absolus : sudo fait tourner ansible en root,
          # ~ se résoudrait en /root/ au lieu de /home/deploy/
          CMD="$CMD --vault-password-file \$HOME/.vault_pass"
          CMD="$CMD -e ansible_ssh_private_key_file=\$HOME/.ssh/id_ed25519"
          CMD="$CMD -e ci_mode=true"

          # Mode check ou apply
          if [ "${INPUT_MODE}" = "check" ]; then
            CMD="$CMD --check --diff"
          fi

          # Tags optionnels
          if [ -n "${INPUT_TAGS}" ]; then
            CMD="$CMD --tags '${INPUT_TAGS}'"
          fi

          # Limit optionnel
          if [ -n "${INPUT_LIMIT}" ]; then
            CMD="$CMD --limit '${INPUT_LIMIT}'"
          fi

          # Toujours supprimer le vault password après exécution
          CMD="$CMD ; rm -f ~/.vault_pass"

          echo "Commande: $CMD"
          ssh vps-bastion "$CMD"
