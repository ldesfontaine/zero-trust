# ============================================================================
# CD — Deploy manuel via GitHub Actions (workflow_dispatch)
#
# Flow : GitHub Runner → SSH VPS (bastion) → ansible-playbook sur le VPS
#        Le VPS relaye vers le LAN via NetBird si --limit inclut des machines LAN.
#
# Prérequis GitHub Secrets :
#   VPS_HOST            — IP publique du VPS
#   VPS_SSH_PORT        — Port SSH durci du VPS
#   SSH_PRIVATE_KEY     — Clé privée Ed25519 (user deploy)
#   ANSIBLE_VAULT_PASSWORD — Mot de passe ansible-vault
# ============================================================================
name: CD - Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: 'Playbook à exécuter'
        required: true
        default: 'setup.yml'
        type: choice
        options:
          - setup.yml
          - playbooks/bootstrap.yml
          - playbooks/infrastructure.yml
          - playbooks/services.yml
          - playbooks/operations.yml
      tags:
        description: 'Tags Ansible (vide = tout)'
        required: false
        default: ''
        type: string
      limit:
        description: 'Limit Ansible (vide = tout)'
        required: false
        default: ''
        type: string
      mode:
        description: 'Mode de déploiement'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - apply

jobs:
  deploy:
    name: "Déployer (${{ inputs.mode }})"
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Afficher les paramètres
        run: |
          echo "Playbook: ${{ inputs.playbook }}"
          echo "Tags: ${{ inputs.tags }}"
          echo "Limit: ${{ inputs.limit }}"
          echo "Mode: ${{ inputs.mode }}"

      - name: Valider les inputs (sécurité)
        env:
          INPUT_TAGS: ${{ inputs.tags }}
          INPUT_LIMIT: ${{ inputs.limit }}
        run: |
          # Bloquer les caractères dangereux dans les inputs libres
          if echo "$INPUT_TAGS" | grep -qP '[;&|`$(){}]'; then
            echo "::error::Tags contient des caractères interdits"
            exit 1
          fi
          if echo "$INPUT_LIMIT" | grep -qP '[;&|`$(){}]'; then
            echo "::error::Limit contient des caractères interdits"
            exit 1
          fi

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<SSHEOF
          Host vps-bastion
            HostName ${{ secrets.VPS_HOST }}
            Port ${{ secrets.VPS_SSH_PORT }}
            User deploy
            IdentityFile ~/.ssh/deploy_key
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Déployer via le VPS (bastion)
        env:
          INPUT_PLAYBOOK: ${{ inputs.playbook }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_TAGS: ${{ inputs.tags }}
          INPUT_LIMIT: ${{ inputs.limit }}
          VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          # Créer le vault password à la volée sur le VPS, déployer, nettoyer
          # Chemins absolus obligatoires : sudo change $HOME en /root/
          DEPLOY_HOME="/home/deploy"

          # Construire la commande ansible-playbook
          ANSIBLE_CMD="sudo /usr/local/bin/ansible-playbook -i inventory.ini ${INPUT_PLAYBOOK}"
          ANSIBLE_CMD="${ANSIBLE_CMD} --vault-password-file ${DEPLOY_HOME}/.vault_pass"
          ANSIBLE_CMD="${ANSIBLE_CMD} -e ansible_ssh_private_key_file=${DEPLOY_HOME}/.ssh/id_ed25519"
          ANSIBLE_CMD="${ANSIBLE_CMD} --diff"

          # Mode check ou apply
          if [ "${INPUT_MODE}" = "check" ]; then
            ANSIBLE_CMD="${ANSIBLE_CMD} --check"
          fi

          # Tags optionnels
          if [ -n "${INPUT_TAGS}" ]; then
            ANSIBLE_CMD="${ANSIBLE_CMD} --tags '${INPUT_TAGS}'"
          fi

          # Limit optionnel
          if [ -n "${INPUT_LIMIT}" ]; then
            ANSIBLE_CMD="${ANSIBLE_CMD} --limit '${INPUT_LIMIT}'"
          fi

          echo "Commande: ${ANSIBLE_CMD}"

          # Exécuter sur le VPS :
          # 1. Écrire le vault password via heredoc (pas d'echo dans les args SSH)
          # 2. Pull le code
          # 3. Lancer ansible-playbook
          # 4. Toujours nettoyer le vault password (même en cas d'échec)
          # 5. Propager le exit code d'ansible-playbook (pas celui de rm)
          ssh vps-bastion bash -s <<REMOTE_EOF
          trap 'rm -f ${DEPLOY_HOME}/.vault_pass' EXIT

          cat > ${DEPLOY_HOME}/.vault_pass <<'VAULTEOF'
          ${VAULT_PASSWORD}
          VAULTEOF
          chmod 600 ${DEPLOY_HOME}/.vault_pass

          cd ${DEPLOY_HOME}/deployVps && git pull origin main

          ${ANSIBLE_CMD}
          REMOTE_EOF
