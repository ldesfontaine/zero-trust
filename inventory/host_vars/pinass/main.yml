# inventory/host_vars/pinass/main.yml
# ═══════════════════════════════════════════════════════════════════════
# Pi (pinass) — configuration specifique
#
# Role : services prives (Vaultwarden, Immich, Seafile, AdGuard),
# zero exposition publique. Accessible uniquement via mesh NetBird.
# ═══════════════════════════════════════════════════════════════════════

# --- SSH ---
base_ssh_port: 2222

# --- Firewall nftables ---
# Pi = zero port public en INPUT.
# Tout le trafic legitime passe par l'interface mesh (wt0).
base_nftables_input_tcp_allow: []
base_nftables_input_udp_allow: []

# Trafic mesh NetBird accepte en input (WireGuard sur eth0 puis tunnel wt0)
base_nftables_enable_mesh: true

# Host peut sortir vers containers Docker (Traefik internal, healthchecks)
base_nftables_output_docker_bridges: true

# Output autorise : DNS externe + HTTPS/HTTP pour apt / GHCR / git
base_nftables_output_allow:
  - { dest: "9.9.9.9",   port: 53,  proto: "udp", comment: "DNS Quad9" }
  - { dest: "1.1.1.1",   port: 53,  proto: "udp", comment: "DNS Cloudflare" }
  - { dest: "0.0.0.0/0", port: 443, proto: "tcp", comment: "HTTPS (apt, GHCR, git, LE)" }
  - { dest: "0.0.0.0/0", port: 80,  proto: "tcp", comment: "HTTP (mirroirs apt)" }

# --- NetBird client ---
# Le groupe NetBird pour ce noeud (utilise par l'API pour generer la setup key)
netbird_client_group: "private"

# --- Traefik (mode internal) ---
# Bind mesh-only : Traefik ecoute uniquement sur l'IP mesh du Pi.
# traefik_mesh_ip est un fact pose par le role Traefik au demarrage
# (fetch via `ip -4 addr show wt0`). Autonome : pas besoin que netbird
# ait tourne avant, ni de fact_caching Ansible.
traefik_mode: "internal"
traefik_listen_address: "{{ traefik_mesh_ip }}"
traefik_tls_email: "{{ vault_admin_email }}"

# ACME staging — TEMPORAIRE jusqu'au 2026-04-24 (fin rate limit LE prod,
# incident 2026-04-17 sur *.ldesfontaine.com). Passe en prod en commentant
# cette ligne + lancer avec -e traefik_acme_ca_reset=true pour wipe le
# cert staging de acme.json avant redemande prod.
traefik_acme_ca_server: "https://acme-staging-v02.api.letsencrypt.org/directory"

# Pas de WAF sur le Pi (trafic mesh trusted, pas de surface d'attaque publique)
traefik_enable_waf: false
traefik_enable_crowdsec: false

# Pas de reseau externe supplementaire pour Traefik Internal
traefik_extra_networks: []
