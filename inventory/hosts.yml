# Inventaire des machines
#
# Premier deploiement :
#   ansible_user: root  → changer en "deploy" apres le premier run du role base
#   ansible_port: 22    → changer en 2222 apres le hardening SSH
all:
  children:
    dmz:
      hosts:
        vps:
          ansible_host: "62.72.36.161"
          ansible_port: 2222
          ansible_user: deploy
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519_deploy"
          machine_services:
            - ntfy
            - portfolio
            - bentopdf
            - traefik
          machine_mesh:
            server: true
            client: true
          machine_crowdsec:
            engine: true
            bouncer: true

    private:
      hosts:
        pinass:
          # ═══════════════════════════════════════════════════════════════
          # ACTIF : MESH direct (2026-04-21)
          # Laptop est peer NetBird, accede au Pi via son IP mesh.
          # Fonctionne depuis n'importe ou tant que le laptop est sur le mesh.
          # ═══════════════════════════════════════════════════════════════
          ansible_host: "100.102.126.146"
          ansible_port: 2222
          ansible_user: deploy
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519_deploy"

          # ═══════════════════════════════════════════════════════════════
          # BACKUP : LAN direct (si mesh down ou laptop hors mesh)
          # Decommenter + commenter le bloc MESH ci-dessus pour bascule.
          # ═══════════════════════════════════════════════════════════════
          # ansible_host: "192.168.1.21"
          # ansible_port: 2222
          # ansible_user: deploy
          # ansible_ssh_private_key_file: "~/.ssh/id_ed25519_deploy"
          # ═══════════════════════════════════════════════════════════════

          machine_services:
            - adguard
            - vaultwarden
            - immich
            - seafile
            - traefik       # toujours en dernier

          machine_mesh:
            server: false
            client: true

          machine_crowdsec:
            engine: false   # Pas d'engine sur le Pi (trafic mesh trusted)
            bouncer: false  # Pas de bouncer (meme raison)
