# Inventaire des machines
#
# Premier deploiement :
#   ansible_user: root  → changer en "deploy" apres le premier run du role base
#   ansible_port: 22    → changer en 2222 apres le hardening SSH
all:
  children:
    dmz:
      hosts:
        vps:
          ansible_host: "62.72.36.161"
          ansible_port: 2222
          ansible_user: deploy
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519_deploy"
          machine_services:
            - ntfy
            - portfolio
            - bentopdf
            - traefik
          machine_mesh:
            server: true
            client: true
          machine_crowdsec:
            engine: true
            bouncer: true

    private:
      hosts:
        pinass:
          # ═══════════════════════════════════════════════════════════════
          # PREMIER RUN (bootstrap depuis LAN) :
          #   ansible_host: 192.168.1.21 (IP LAN fixe, reservation DHCP box)
          #   ansible_port: 22            (SSH par defaut, durci en 2222 apres)
          #   ansible_user: lucas         (user cree par Pi Imager)
          #   key: id_ed25519_vps_homelab (cle perso humaine)
          #
          # APRES BOOTSTRAP (runs suivants via mesh) :
          #   Commenter les 4 lignes ci-dessous et decommenter le bloc "MESH"
          # ═══════════════════════════════════════════════════════════════
          ansible_host: "192.168.1.21"
          ansible_port: 22
          ansible_user: lucas
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519_vps_homelab"

          # ═══════════════════════════════════════════════════════════════
          # MESH (decommenter apres bootstrap reussi) :
          # ansible_host: "100.64.X.X"                  # IP mesh attribuee par NetBird
          # ansible_port: 2222
          # ansible_user: deploy
          # ansible_ssh_private_key_file: "~/.ssh/id_ed25519_deploy"
          # ansible_ssh_common_args: "-o ProxyJump=deploy@62.72.36.161:2222"
          # ═══════════════════════════════════════════════════════════════

          machine_services:
            - adguard
            - vaultwarden
            - immich
            - seafile
            - traefik       # toujours en dernier

          machine_mesh:
            server: false
            client: true

          machine_crowdsec:
            engine: false   # Pas d'engine sur le Pi (trafic mesh trusted)
            bouncer: false  # Pas de bouncer (meme raison)
