# Inventaire des machines
#
# Premier deploiement :
#   ansible_user: root  → changer en "deploy" apres le premier run du role base
#   ansible_port: 22    → changer en 2222 apres le hardening SSH

all:
  children:

    dmz:
      hosts:
        vps:
          ansible_host: "62.72.36.161"
          ansible_port: 2222       # → 2222 apres le premier run du role base
          ansible_user: deploy     # → deploy apres le premier run du role base
          ansible_ssh_private_key_file: "~/.ssh/id_ed25519_deploy"    # id_ed25519_deploy

          machine_services:
            - ntfy
            - portfolio
            - bentopdf
            - traefik

          machine_mesh:
            server: true       # deploie netbird_server + netbird_config
            client: true       # enroll le noeud sur le mesh

