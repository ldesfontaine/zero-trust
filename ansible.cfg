[defaults]
inventory = inventory.ini
deprecation_warnings = False
roles_path = roles

[ssh_connection]
# ServerAliveInterval : le client SSH envoie des keepalives toutes les 20s
# → empêche les firewalls intermédiaires de dropper les connexions idle
# pipelining : réduit les connexions SSH par tâche (sudo sans reconnexion)
#
# IMPORTANT : ControlMaster/ControlPersist/ControlPath sont geres via les
# settings natifs Ansible (control_path) et NON dans ssh_args.
# Raison : dans ssh_args, %%h est passe tel quel a SSH qui l'interprete
# comme un % litteral → toutes les connexions partagent le meme socket
# → le Pi reutilise la connexion du VPS !
ssh_args = -o StrictHostKeyChecking=no -o ServerAliveInterval=20 -o ServerAliveCountMax=10
pipelining = True
control_path_dir = /tmp
control_path = %(directory)s/ansible-ssh-%%h-%%p-%%r
