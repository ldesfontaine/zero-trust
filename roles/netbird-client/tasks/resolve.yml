# ============================================================================
# NetBird Resolve — Calculer l'IP de binding par host
#
# Chaque host déclare host_netbird_ip dans ses host_vars.
# Ce fichier vérifie si l'IP est réellement présente sur une interface réseau
# et produit 2 facts consommés par tous les templates :
#
#   netbird_bind_ip    — IP NetBird si interface UP, sinon 127.0.0.1
#   netbird_mesh_ready — true si le mesh est opérationnel
#
# Prérequis : gather_facts (setup) déjà exécuté.
# ============================================================================
---

- name: "NetBird Resolve : Vérifier que host_netbird_ip est défini"
  ansible.builtin.assert:
    that:
      - host_netbird_ip is defined
    fail_msg: >
      host_netbird_ip absent des host_vars de {{ inventory_hostname }}.
      Ajouter host_netbird_ip dans host_vars/{{ inventory_hostname }}.yml
  tags: [always]

- name: "NetBird Resolve : Déterminer si l'IP NetBird est un placeholder"
  ansible.builtin.set_fact:
    _nb_ip_configured: "{{ host_netbird_ip not in ['CHANGE_ME', 'REMPLACER_APRES_ENROLEMENT_NETBIRD'] }}"
  tags: [always]

# ansible_all_ipv4_addresses peut omettre les interfaces WireGuard (wt0).
# ip addr est fiable. Retries : après reload du serveur NetBird,
# le client met quelques secondes à rétablir le tunnel.
- name: "NetBird Resolve : Vérifier la présence de l'IP sur une interface" # noqa: risky-shell-pipe
  ansible.builtin.shell: "ip addr show | grep -q 'inet {{ host_netbird_ip }}/'"
  register: _nb_ip_check
  changed_when: false
  failed_when: false
  check_mode: false
  retries: 4
  delay: 5
  until: _nb_ip_check.rc == 0
  when: _nb_ip_configured | bool
  tags: [always]

- name: "NetBird Resolve : Binding mesh (IP présente sur interface)"
  ansible.builtin.set_fact:
    _nb_ip_on_interface: true
    netbird_mesh_ready: true
    netbird_bind_ip: "{{ host_netbird_ip }}"
  when:
    - _nb_ip_configured | bool
    - _nb_ip_check.rc is defined
    - _nb_ip_check.rc == 0
  tags: [always]

- name: "NetBird Resolve : Fallback (mesh indisponible ou IP non configurée)"
  ansible.builtin.set_fact:
    _nb_ip_on_interface: false
    netbird_mesh_ready: false
    netbird_bind_ip: "127.0.0.1"
  when: >-
    not (_nb_ip_configured | bool)
    or _nb_ip_check.rc is not defined
    or _nb_ip_check.rc != 0
  tags: [always]

- name: "NetBird Resolve : INFO — Mesh non opérationnel"
  ansible.builtin.debug:
    msg: >
      NetBird mesh non prêt sur {{ inventory_hostname }}.
      host_netbird_ip={{ host_netbird_ip }} | configuré={{ _nb_ip_configured }} |
      sur_interface={{ _nb_ip_on_interface }}.
      Binding sur 127.0.0.1 — les services ne seront pas joignables via mesh.
      Relancer après enrollment NetBird.
  when: not (netbird_mesh_ready | bool)
  tags: [always]
