# ============================================================================
# Système VPS — Mise à jour, outils, firewall
# Migration NPM → Traefik :
#   - Plus de port 49152:49200 (coturn supprimé)
#   - Port 33073 gardé pour backward compat gRPC NetBird
#   - Port 3478 UDP pour STUN NetBird
#   - Traefik gère 80/443 nativement
# ============================================================================
 
- name: Mettre à jour le cache apt
  apt:
    update_cache: yes
    cache_valid_time: 3600
 
- name: Mettre à jour tous les paquets
  apt:
    upgrade: safe
  environment:
    NEEDRESTART_MODE: "a"   # auto-restart services sans prompt (évite le hang interactif)

# Reset la connexion SSH après l'upgrade : si openssh-server a été mis à jour,
# sshd a redémarré et le socket ControlMaster Ansible est périmé.
# Ce meta task force Ansible à se reconnecter proprement.
- name: Réinitialiser la connexion SSH après apt upgrade (sshd potentiellement redémarré)
  meta: reset_connection

- name: Installer les outils de base
  apt:
    name:
      - curl
      - python3-pip
      - git
      - nftables
      - gnupg
      - unattended-upgrades
      - apt-listchanges
    state: present
 
- name: Activer les mises à jour automatiques
  copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'
 
- name: Configurer les sources des mises à jour automatiques
  copy:
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}";
        "${distro_id}:${distro_codename}-security";
        "${distro_id}ESMApps:${distro_codename}-apps-security";
        "${distro_id}ESM:${distro_codename}-infra-security";
        "Docker:${distro_codename}";
      };
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: '0644'
 
# --- Firewall nftables VPS ---
# nftables natif (PAS UFW) pour éviter les conflits avec CrowdSec bouncer
# CrowdSec bouncer injecte ses propres chaînes dans nftables

- name: Vérifier si UFW est installé
  shell: dpkg-query -W -f='${Status}' ufw 2>/dev/null | grep -q "install ok installed"
  register: ufw_installed
  changed_when: false
  failed_when: false

- name: Désactiver UFW si présent (conflit avec nftables)
  systemd:
    name: ufw
    state: stopped
    enabled: false
  when: ufw_installed.rc == 0

- name: Déployer la configuration nftables
  template:
    src: nftables_conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: '0600'
    validate: '/usr/sbin/nft -c -f %s'
  notify: Reload nftables

- name: Activer et démarrer nftables
  systemd:
    name: nftables
    state: started
    enabled: true