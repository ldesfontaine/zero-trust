# ============================================================================
# Traefik — Reverse proxy + TLS (L3a)
#
# Deploie Traefik dans /opt/backbone/ sur le reseau sentinel_net.
# Le reseau est cree en amont par ce role via docker_network.
# Les services L4 et le role netbird-server rejoignent ce meme reseau.
# ============================================================================
---

# -- Reseau partage sentinel_net (idempotent) --------------------------------
- name: Verifier si le reseau sentinel_net existe
  shell: "docker network inspect sentinel_net"
  register: sentinel_net_check
  changed_when: false
  failed_when: false

- name: Creer le reseau Docker sentinel_net
  shell: "docker network create --driver bridge sentinel_net"
  when: sentinel_net_check.rc != 0

# -- Arborescence backbone ---------------------------------------------------
- name: Creer les dossiers backbone
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vault_ssh_user }}"
    group: "{{ vault_ssh_user }}"
    mode: '0755'
  loop:
    - "{{ backbone_dir }}"
    - "{{ backbone_dir }}/traefik"
    - "{{ backbone_dir }}/traefik/dynamic"

# -- Migration volumes (VPS existant uniquement) -----------------------------
- name: Verifier si l'ancien acme.json existe dans /opt/stack
  stat:
    path: "/opt/stack/traefik/acme.json"
  register: old_acme_json

- name: Sauvegarder acme.json depuis l'ancienne stack
  copy:
    src: "/opt/stack/traefik/acme.json"
    dest: "{{ backbone_dir }}/traefik/acme.json.migrated"
    remote_src: true
    owner: "{{ vault_ssh_user }}"
    mode: '0600'
  when: old_acme_json.stat.exists

# -- Templates ---------------------------------------------------------------
# Note : le docker-compose.yml backbone (traefik + netbird) est géré par
# le rôle netbird-server (L3b) qui possède la stack complète.
# Ce rôle déploie uniquement la config dynamique Traefik (routes Pi).

- name: Deployer la config dynamique Traefik (services Pi)
  template:
    src: "traefik_dynamic_yml.j2"
    dest: "{{ backbone_dir }}/traefik/dynamic/pi-public.yml"
    owner: "{{ vault_ssh_user }}"
    mode: '0644'
  notify: Reload Backbone Stack
