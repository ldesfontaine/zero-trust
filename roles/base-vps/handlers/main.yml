---
- name: Reload nftables
  ansible.builtin.systemd:
    name: nftables
    state: reloaded
  notify: Restart CrowdSec bouncer after nftables reload

- name: Restart CrowdSec bouncer after nftables reload
  ansible.builtin.shell: >
    test -f /usr/bin/crowdsec-firewall-bouncer &&
    systemctl restart crowdsec-firewall-bouncer || true
  changed_when: false
