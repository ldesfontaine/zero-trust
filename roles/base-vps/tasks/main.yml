# ============================================================================
# base-vps — Paquets VPS-only, firewall nftables, hardening SSH
#
# Prérequis : rôle common (apt upgrade, outils de base, unattended-upgrades)
#
# SSH hardening :
#   Run 1 : SSH sur 22 → déploie sshd_config (port durci) →
#           restart async → wait_for port durci → flag bootstrap → nftables sans 22
#   Run 2+: idempotent, même mécanique
# ============================================================================
---

# --- Paquets spécifiques VPS ---

- name: Installer les paquets VPS
  apt:
    name:
      - cron
      - nftables
    state: present

# --- Ansible venv système ---
# Créé par le bootstrap (L0). Vérifie seulement que les symlinks existent.

- name: Vérifier que le venv Ansible existe
  stat:
    path: /opt/ansible/bin/ansible-playbook
  register: ansible_venv_check

- name: Vérifier les symlinks Ansible dans /usr/local/bin
  file:
    src: "/opt/ansible/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
  loop:
    - ansible-playbook
    - ansible-galaxy
    - ansible
  when: ansible_venv_check.stat.exists

# --- Firewall nftables ---
# nftables natif (PAS UFW) — cohabitation avec CrowdSec bouncer

- name: Vérifier si UFW est installé
  shell: dpkg-query -W -f='${Status}' ufw 2>/dev/null | grep -q "install ok installed"
  register: ufw_installed
  changed_when: false
  failed_when: false
  check_mode: false

- name: Désactiver UFW si présent (conflit avec nftables)
  systemd:
    name: ufw
    state: stopped
    enabled: false
  when: ufw_installed.rc is defined and ufw_installed.rc == 0

- name: Déployer la configuration nftables
  template:
    src: nftables_conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: '0600'
    validate: '/usr/sbin/nft -c -f %s'
  notify: Reload nftables

- name: Activer et démarrer nftables
  systemd:
    name: nftables
    state: started
    enabled: true

# --- Hardening SSH ---

- name: Déploiement de la configuration SSH durcie
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    validate: '/usr/sbin/sshd -t -f %s'
  vars:
    ssh_user: "{{ vault_ssh_user }}"
    ssh_port: "{{ vault_ssh_port }}"
  register: _sshd_config

# Restart SSH : deux chemins selon le mode de connexion
# Mode laptop (SSH distant) : async pour ne pas tuer la connexion Ansible
# Mode CI (connection: local) : restart direct

- name: Redémarrer SSH (async — connexion encore sur port 22)
  systemd:
    name: sshd
    state: restarted
  async: 1
  poll: 0
  ignore_errors: true
  when:
    - _sshd_config is changed
    - ansible_connection | default('ssh') != 'local'

- name: Redémarrer SSH (mode local — pas de risque de coupure)
  systemd:
    name: sshd
    state: restarted
  when:
    - _sshd_config is changed
    - ansible_connection | default('ssh') == 'local'

- name: Attendre que SSH soit disponible sur le nouveau port (depuis le poste)
  wait_for:
    host: "{{ ansible_host }}"
    port: "{{ vault_ssh_port }}"
    delay: 3
    timeout: 30
  delegate_to: localhost
  vars:
    ansible_connection: local
  become: false
  when:
    - _sshd_config is changed
    - ansible_connection | default('ssh') != 'local'

- name: Attendre que SSH soit disponible sur le nouveau port (mode local)
  wait_for:
    host: "127.0.0.1"
    port: "{{ vault_ssh_port }}"
    delay: 3
    timeout: 30
  become: false
  when:
    - _sshd_config is changed
    - ansible_connection | default('ssh') == 'local'

- name: Mise à jour du port SSH pour la session Ansible en cours
  set_fact:
    ansible_port: "{{ vault_ssh_port }}"
  when: ansible_connection | default('ssh') != 'local'

# Fermer le port 22 dans nftables (bootstrap terminé)
- name: Créer le dossier facts.d
  file:
    path: /etc/ansible/facts.d
    state: directory
    owner: root
    mode: '0755'

- name: Désactiver le port 22 dans nftables (flag bootstrap terminé)
  copy:
    content: '{"ssh_bootstrap_open": false}'
    dest: /etc/ansible/facts.d/ssh_hardened.fact
    owner: root
    mode: '0644'
  when: vault_ssh_port | int != 22
  register: _ssh_bootstrap_flag

- name: Re-générer nftables.conf sans le port 22
  template:
    src: nftables_conf.j2
    dest: /etc/nftables.conf
    owner: root
    mode: '0600'
    validate: '/usr/sbin/nft -c -f %s'
  vars:
    ssh_bootstrap_open: false
  when:
    - vault_ssh_port | int != 22
    - _ssh_bootstrap_flag is changed
  notify: Reload nftables
