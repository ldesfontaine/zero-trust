# ============================================================================
# Common — Mise à jour, outils de base, unattended-upgrades
# Partagé entre VPS et Pi. Ne contient RIEN de spécifique à une machine.
# ============================================================================

- name: Mettre à jour le cache apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Mettre à jour tous les paquets
  ansible.builtin.apt:
    upgrade: safe
  environment:
    NEEDRESTART_MODE: "a"

# Si openssh-server a été mis à jour, sshd a redémarré
# et le socket ControlMaster Ansible est périmé.
- name: Réinitialiser la connexion SSH après apt upgrade
  ansible.builtin.meta: reset_connection

- name: Installer les outils de base
  ansible.builtin.apt:
    name:
      - curl
      - jq
      - python3-pip
      - git
      - gnupg
      - unattended-upgrades
      - apt-listchanges
    state: present

# Cosign — vérification de signature des images Docker GHCR (supply chain)
- name: Installer cosign
  ansible.builtin.get_url:
    url: "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"
    dest: /usr/local/bin/cosign
    mode: '0755'
    owner: root
  when: not ansible_check_mode

- name: Activer les mises à jour automatiques
  ansible.builtin.copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'

- name: Configurer les sources des mises à jour automatiques
  ansible.builtin.copy:
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}";
        "${distro_id}:${distro_codename}-security";
        "${distro_id}ESMApps:${distro_codename}-apps-security";
        "${distro_id}ESM:${distro_codename}-infra-security";
        "Docker:${distro_codename}";
      };
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: '0644'
