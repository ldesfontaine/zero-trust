# ============================================================
# Ntfy — serveur de notifications push
#
# Container read-only, reseau non isole (internal: false) :
# ntfy doit sortir sur internet pour relayer les push APNs via ntfy.sh.
# Route par Traefik Edge via labels Docker.
# Auth deny-all par defaut, user admin + token crees automatiquement.
# ============================================================

# Parent en root:root 0755 : un attaquant qui compromet le container
# ne peut ecrire QUE dans cache/ et etc/, pas ailleurs
- name: "Ntfy — Creer le repertoire parent du module"
  ansible.builtin.file:
    path: "{{ ntfy_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "Ntfy — Creer les sous-dossiers de donnees"
  ansible.builtin.file:
    path: "{{ ntfy_data_dir }}/{{ item }}"
    state: directory
    owner: "{{ ntfy_container_uid }}"
    group: "{{ ntfy_container_gid }}"
    mode: "0750"
  loop:
    - cache
    - etc

- name: "Ntfy — Valider le format du vault_ntfy_auth_token"
  ansible.builtin.fail:
    msg: >-
      vault_ntfy_auth_token doit respecter le format strict ntfy :
      tk_ + 29 chars [a-z0-9] (32 chars au total). Valeur actuelle invalide.
      Regenerer : echo "tk_$(tr -dc 'a-z0-9' < /dev/urandom | head -c 29)"
  when:
    - vault_ntfy_auth_token | length > 0
    - not (vault_ntfy_auth_token is match('^tk_[a-z0-9]{29}$'))

- name: "Ntfy — Deployer la configuration serveur"
  ansible.builtin.template:
    src: server.yml.j2
    dest: "{{ ntfy_data_dir }}/etc/server.yml"
    owner: "{{ ntfy_container_uid }}"
    group: "{{ ntfy_container_gid }}"
    mode: "0640"
  notify: Redemarrer ntfy

- name: "Ntfy — Verifier le drift reseau"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/_shared/tasks/check_network_drift.yml"
  vars:
    network_name: "{{ ntfy_network_name }}"
    network_internal: false

- name: "Ntfy — Deployer le docker-compose"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ntfy_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Redemarrer ntfy

- name: "Ntfy — Lancer le container"
  community.docker.docker_compose_v2:
    project_src: "{{ ntfy_data_dir }}"
    state: present

# --- Provisioning user admin + token (idempotent) ---
# Token : pre-provisionne via auth-startup-queries dans server.yml.j2
# (la CLI "ntfy token add <user> <valeur>" ignore la valeur fournie).
# Le startup query SELECT-INSERT depuis user WHERE user='admin' :
# au tout premier boot, le user n'existe pas encore et l'INSERT est no-op.
# On force donc un restart de ntfy apres creation du user admin pour
# que le startup query reussisse.

- name: "Ntfy — Verifier si le user admin existe"
  ansible.builtin.command:
    cmd: docker exec ntfy ntfy user list
  register: ntfy_user_list
  changed_when: false

- name: "Ntfy — Creer le user admin"
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - -e
      - "NTFY_PASSWORD={{ vault_ntfy_admin_password }}"
      - ntfy
      - ntfy
      - user
      - add
      - --role=admin
      - admin
  register: ntfy_user_add
  changed_when: ntfy_user_add.rc == 0
  failed_when:
    - ntfy_user_add.rc != 0
    - "'already exists' not in (ntfy_user_add.stderr | default(''))"
  when: "'user admin' not in ntfy_user_list.stdout"
  no_log: true

# Restart inline (pas un handler) : le startup query SQL doit s'executer
# IMMEDIATEMENT apres la creation du user admin, pas en fin de play, sinon
# une autre task qui depend du token (futur agent monitoring) echouerait.
- name: "Ntfy — Redemarrer pour declencher l'INSERT du token"  # noqa: no-handler
  ansible.builtin.command:
    cmd: docker restart ntfy
  when: ntfy_user_add is changed
  changed_when: true
