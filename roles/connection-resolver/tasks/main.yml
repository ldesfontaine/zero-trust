# ============================================================================
# Connection Resolver — Detection automatique du contexte de connexion
#
# Remplace le hack ci_mode par une detection automatique :
#
# VPS (groupe dmz) :
#   - Detecte si Ansible tourne SUR le VPS → connection: local
#   - Sinon → connection: ssh
#   - Cascade port SSH : durci → 22
#
# Pi (groupe lan) :
#   - Cascade route : IP LAN → IP NetBird → fail
#   - Cascade port SSH : durci → 22
#
# Facts produits :
#   resolved_connection — 'local' ou 'ssh'
#   resolved_host       — IP joignable (LAN ou NetBird pour le Pi)
#   resolved_port       — port SSH actif (durci ou 22)
#   resolved_user       — user SSH (vault_ssh_user ou vault_pi_ssh_user)
#
# Prerequis : gather_facts: false (ce role fait son propre setup)
# Note : bootstrap.yml ne passe PAS par ce resolver.
# ============================================================================
---

# ------------------------------------------------------------------
# Etape 1 : Determiner les variables source selon le groupe
# ------------------------------------------------------------------
- name: "Connection Resolver : Identifier les parametres de connexion"
  set_fact:
    _cr_target_user: "{{ vault_ssh_user if 'dmz' in group_names else vault_pi_ssh_user }}"
    _cr_hardened_port: "{{ vault_ssh_port if 'dmz' in group_names else vault_pi_ssh_port }}"
    _cr_lan_ip: "{{ vault_pi_ip | default(omit) }}"
    _cr_netbird_ip: "{{ host_netbird_ip | default('CHANGE_ME') }}"
    _cr_is_dmz: "{{ 'dmz' in group_names }}"
  tags: [always]

# ------------------------------------------------------------------
# Etape 2 (DMZ uniquement) : Detecter si on tourne sur le VPS
# ------------------------------------------------------------------
- name: "Connection Resolver : Tester si Ansible tourne sur le VPS"
  command: cat /etc/hostname
  register: _cr_local_hostname
  changed_when: false
  failed_when: false
  check_mode: false
  delegate_to: localhost
  become: false
  vars:
    ansible_connection: local
  when: _cr_is_dmz | bool
  tags: [always]

- name: "Connection Resolver : Determiner le mode de connexion VPS"
  set_fact:
    resolved_connection: >-
      {{ 'local'
         if (_cr_is_dmz | bool and
             _cr_local_hostname.stdout | default('') == inventory_hostname)
         else 'ssh' }}
  when: _cr_is_dmz | bool
  tags: [always]

# ------------------------------------------------------------------
# Etape 3 (LAN uniquement) : Cascade de route vers le Pi
# IP LAN d'abord, fallback sur IP NetBird
# ------------------------------------------------------------------
- name: "Connection Resolver : Tester la joignabilite LAN port durci ({{ _cr_lan_ip | default('N/A') }}:{{ _cr_hardened_port }})"
  wait_for:
    host: "{{ _cr_lan_ip }}"
    port: "{{ _cr_hardened_port }}"
    timeout: 3
  delegate_to: localhost
  vars:
    ansible_connection: local
  become: false
  check_mode: false
  ignore_errors: true
  register: _cr_lan_hardened
  when:
    - not (_cr_is_dmz | bool)
    - _cr_lan_ip is defined
    - _cr_lan_ip not in ['CHANGE_ME', omit]
  tags: [always]

- name: "Connection Resolver : Tester la joignabilite LAN port 22 ({{ _cr_lan_ip | default('N/A') }}:22)"
  wait_for:
    host: "{{ _cr_lan_ip }}"
    port: 22
    timeout: 3
  delegate_to: localhost
  vars:
    ansible_connection: local
  become: false
  check_mode: false
  ignore_errors: true
  register: _cr_lan_fallback
  when:
    - not (_cr_is_dmz | bool)
    - _cr_lan_ip is defined
    - _cr_lan_ip not in ['CHANGE_ME', omit]
    - _cr_lan_hardened is skipped or _cr_lan_hardened is failed
  tags: [always]

- name: "Connection Resolver : Consolider le resultat LAN"
  set_fact:
    _cr_lan_reachable: "{{ _cr_lan_hardened if (_cr_lan_hardened is not skipped and _cr_lan_hardened is not failed) else _cr_lan_fallback }}"
    _cr_lan_port: "{{ _cr_hardened_port if (_cr_lan_hardened is not skipped and _cr_lan_hardened is not failed) else '22' }}"
  when:
    - not (_cr_is_dmz | bool)
  tags: [always]

- name: "Connection Resolver : Tester la joignabilite NetBird port durci ({{ _cr_netbird_ip }}:{{ _cr_hardened_port }})"
  wait_for:
    host: "{{ _cr_netbird_ip }}"
    port: "{{ _cr_hardened_port }}"
    timeout: 3
  delegate_to: localhost
  vars:
    ansible_connection: local
  become: false
  check_mode: false
  ignore_errors: true
  register: _cr_netbird_hardened
  when:
    - not (_cr_is_dmz | bool)
    - _cr_lan_reachable is skipped or _cr_lan_reachable is failed
    - _cr_netbird_ip not in ['CHANGE_ME', 'REMPLACER_APRES_ENROLEMENT_NETBIRD']
  tags: [always]

- name: "Connection Resolver : Tester la joignabilite NetBird port 22 ({{ _cr_netbird_ip }}:22)"
  wait_for:
    host: "{{ _cr_netbird_ip }}"
    port: 22
    timeout: 3
  delegate_to: localhost
  vars:
    ansible_connection: local
  become: false
  check_mode: false
  ignore_errors: true
  register: _cr_netbird_fallback
  when:
    - not (_cr_is_dmz | bool)
    - _cr_lan_reachable is skipped or _cr_lan_reachable is failed
    - _cr_netbird_hardened is skipped or _cr_netbird_hardened is failed
    - _cr_netbird_ip not in ['CHANGE_ME', 'REMPLACER_APRES_ENROLEMENT_NETBIRD']
  tags: [always]

- name: "Connection Resolver : Consolider le resultat NetBird"
  set_fact:
    _cr_netbird_reachable: "{{ _cr_netbird_hardened if (_cr_netbird_hardened is not skipped and _cr_netbird_hardened is not failed) else _cr_netbird_fallback }}"
    _cr_netbird_port: "{{ _cr_hardened_port if (_cr_netbird_hardened is not skipped and _cr_netbird_hardened is not failed) else '22' }}"
  when:
    - not (_cr_is_dmz | bool)
    - _cr_lan_reachable is skipped or _cr_lan_reachable is failed
  tags: [always]

- name: "Connection Resolver : Determiner la route et connexion Pi"
  set_fact:
    resolved_host: >-
      {% if _cr_lan_reachable is defined and _cr_lan_reachable is not skipped and _cr_lan_reachable is not failed %}{{ _cr_lan_ip }}{% elif _cr_netbird_reachable is defined and _cr_netbird_reachable is not skipped and _cr_netbird_reachable is not failed %}{{ _cr_netbird_ip }}{% else %}UNREACHABLE{% endif %}
    _cr_route_port: >-
      {% if _cr_lan_reachable is defined and _cr_lan_reachable is not skipped and _cr_lan_reachable is not failed %}{{ _cr_lan_port | default(_cr_hardened_port) }}{% elif _cr_netbird_reachable is defined and _cr_netbird_reachable is not skipped and _cr_netbird_reachable is not failed %}{{ _cr_netbird_port | default(_cr_hardened_port) }}{% else %}22{% endif %}
    resolved_connection: "ssh"
  when: not (_cr_is_dmz | bool)
  tags: [always]

- name: "Connection Resolver : ECHEC — Pi injoignable"
  fail:
    msg: >
      Pi injoignable sur tous les chemins.
      LAN ({{ _cr_lan_ip | default('non defini') }}) : {{ 'skipped' if (_cr_lan_reachable is skipped) else ('OK' if (_cr_lan_reachable is not failed) else 'ECHEC') }}
      NetBird ({{ _cr_netbird_ip }}) : {{ 'skipped' if (_cr_netbird_reachable is skipped) else ('OK' if (_cr_netbird_reachable is not failed) else 'ECHEC') }}
      Verifier l'enrollment NetBird ou la connectivite LAN.
  when:
    - not (_cr_is_dmz | bool)
    - resolved_host == 'UNREACHABLE'
  tags: [always]

# ------------------------------------------------------------------
# Etape 4 : Cascade de detection du port SSH (durci → 22)
# ------------------------------------------------------------------
- name: "Connection Resolver : Determiner le host cible pour le test SSH"
  set_fact:
    _cr_ssh_test_host: >-
      {{ ansible_host if (_cr_is_dmz | bool) else resolved_host }}
  tags: [always]

- name: "Connection Resolver : Tester le port SSH durci ({{ _cr_hardened_port }})"
  wait_for:
    host: "{{ _cr_ssh_test_host }}"
    port: "{{ _cr_hardened_port }}"
    timeout: 5
  delegate_to: localhost
  vars:
    ansible_connection: local
  become: false
  check_mode: false
  ignore_errors: true
  register: _cr_hardened_port_check
  when: resolved_connection != 'local'
  tags: [always]

- name: "Connection Resolver : Determiner le port SSH actif"
  set_fact:
    resolved_port: >-
      {% if not (_cr_is_dmz | bool) %}{{ _cr_route_port | default('22') }}{% elif resolved_connection == 'local' or (_cr_hardened_port_check is not skipped and _cr_hardened_port_check is not failed) %}{{ _cr_hardened_port }}{% else %}22{% endif %}
  tags: [always]

- name: "Connection Resolver : Determiner le user SSH"
  set_fact:
    resolved_user: "{{ _cr_target_user }}"
  tags: [always]

# ------------------------------------------------------------------
# Etape 5 : Appliquer les facts resolus a la connexion Ansible
# ------------------------------------------------------------------
- name: "Connection Resolver : Appliquer la connexion resolue"
  set_fact:
    ansible_connection: "{{ resolved_connection }}"
    ansible_port: "{{ resolved_port }}"
    ansible_user: "{{ resolved_user }}"
    ansible_ssh_private_key_file: "{{ priv_ssh_key_path }}"
  tags: [always]

- name: "Connection Resolver : Appliquer le host resolu (Pi)"
  set_fact:
    ansible_host: "{{ resolved_host }}"
  when: not (_cr_is_dmz | bool)
  tags: [always]

# ------------------------------------------------------------------
# Etape 6 : Gather facts maintenant que la connexion est resolue
# ------------------------------------------------------------------
- name: "Connection Resolver : Gather facts avec la connexion resolue"
  setup:
  tags: [always]

# ------------------------------------------------------------------
# Etape 7 : Resume de la resolution
# ------------------------------------------------------------------
- name: "Connection Resolver : Resume"
  debug:
    msg: >
      {{ inventory_hostname }} — connection={{ resolved_connection }}
      host={{ ansible_host }} port={{ resolved_port }}
      user={{ resolved_user }}
  tags: [always]
