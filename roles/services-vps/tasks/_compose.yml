# Infrastructure partagée stack VPS — deploie le docker-compose.yml + .env
# Tagué [always] dans main.yml : s'exécute quel que soit le tag service demandé.
---
- name: Créer les dossiers de la stack VPS
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vault_ssh_user }}"
    group: "{{ vault_ssh_user }}"
    mode: '0755'
  loop:
    - "{{ stack_dir }}"

- name: Déployer le fichier .env (secrets vault — mode 0600)
  template:
    src: sentinel.env.j2
    dest: "{{ stack_dir }}/.env"
    owner: "{{ vault_ssh_user }}"
    mode: '0600'
  notify: Reload Docker Stack VPS

- name: Déployer les configurations (Templates)
  template:
    src: "{{ item.src }}"
    dest: "{{ stack_dir }}/{{ item.dest }}"
    owner: "{{ vault_ssh_user }}"
    mode: '0644'
  loop:
    - { src: 'docker-compose_vps_yml.j2',    dest: 'docker-compose.yml' }
    - { src: 'acquis_yaml.j2',               dest: 'acquis.yaml' }
  notify: Reload Docker Stack VPS
