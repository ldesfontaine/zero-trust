# Infrastructure partagée stack VPS — deploie le docker-compose.yml + env files
# Tagué [always] dans main.yml : s'exécute quel que soit le tag service demandé.
---
- name: Créer les dossiers de la stack VPS
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vault_ssh_user }}"
    group: "{{ vault_ssh_user }}"
    mode: '0755'
  loop:
    - "{{ stack_dir }}"

- name: Déployer .env (interpolation Compose CrowdSec — mode 0600)
  template:
    src: sentinel.env.j2
    dest: "{{ stack_dir }}/.env"
    owner: "{{ vault_ssh_user }}"
    mode: '0600'
  notify: Reload Docker Stack VPS

- name: Déployer bientot.env (secrets Bientôt agent — mode 0600)
  template:
    src: sentinel-bientot.env.j2
    dest: "{{ stack_dir }}/bientot.env"
    owner: "{{ vault_ssh_user }}"
    mode: '0600'
  notify: Reload Docker Stack VPS

# Vérifier la signature cosign AVANT le déploiement (supply chain)
- name: Vérifier la signature de l'image bientot-agent
  command: >
    /usr/local/bin/cosign verify
    --certificate-identity-regexp="https://github.com/ldesfontaine/.*"
    --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
    "{{ bientot_agent_image }}:{{ bientot_agent_version }}"
  changed_when: false
  when: not ansible_check_mode

- name: Déployer les configurations (Templates)
  template:
    src: "{{ item.src }}"
    dest: "{{ stack_dir }}/{{ item.dest }}"
    owner: "{{ vault_ssh_user }}"
    mode: '0644'
  loop:
    - { src: 'docker-compose_vps_yml.j2',    dest: 'docker-compose.yml' }
    - { src: 'acquis_yaml.j2',               dest: 'acquis.yaml' }
  notify: Reload Docker Stack VPS
