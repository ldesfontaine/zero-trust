# Node Exporter (VPS) — bind 127.0.0.1 uniquement
---
- name: Pull de l'image node-exporter
  ansible.builtin.shell: "cd {{ stack_dir }} && docker compose pull node-exporter"
  changed_when: false

- name: Lancement de node-exporter
  ansible.builtin.shell: "cd {{ stack_dir }} && docker compose up -d node-exporter"
  register: _node_exporter_up
  changed_when: "'Started' in _node_exporter_up.stderr or 'Created' in _node_exporter_up.stderr"
