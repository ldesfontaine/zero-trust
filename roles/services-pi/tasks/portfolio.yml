# Portfolio — image GHCR (plus de git clone + build), read_only + tmpfs
---
# Vérifier la signature cosign AVANT le pull (supply chain)
- name: Vérifier la signature de l'image portfolio
  command: >
    /usr/local/bin/cosign verify
    --certificate-identity-regexp="https://github.com/ldesfontaine/.*"
    --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
    "{{ portfolio_image }}:{{ portfolio_version }}"
  changed_when: false
  when: not ansible_check_mode

- name: Pull de l'image Portfolio
  shell: "cd {{ pi_stack_dir }} && docker compose pull portfolio"
  changed_when: false

- name: Lancement de Portfolio
  shell: "cd {{ pi_stack_dir }} && docker compose up -d portfolio"
  register: _portfolio_up
  changed_when: "'Started' in _portfolio_up.stderr or 'Created' in _portfolio_up.stderr"
