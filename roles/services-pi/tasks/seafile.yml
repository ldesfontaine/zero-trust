# Seafile + MariaDB + Memcached
---
- name: Création des dossiers Seafile
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vault_pi_ssh_user }}"
    group: "{{ vault_pi_ssh_user }}"
    mode: '0755'
  loop:
    - "{{ pi_stack_dir }}/seafile"
    - "{{ pi_stack_dir }}/seafile/data"
    - "{{ pi_stack_dir }}/seafile/db"

- name: Pull des images Seafile
  ansible.builtin.shell: "cd {{ pi_stack_dir }} && docker compose pull seafile seafile-db memcached"
  changed_when: false

- name: Lancement de Seafile
  ansible.builtin.shell: "cd {{ pi_stack_dir }} && docker compose up -d seafile seafile-db memcached"
  register: _seafile_up
  changed_when: "'Started' in _seafile_up.stderr or 'Created' in _seafile_up.stderr"
