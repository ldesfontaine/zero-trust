# ============================================================================
# Hardening SSH — VPS
#
# Run 1 : SSH tourne sur 22 → déploie sshd_config (port durci) →
#         restart async (connexion encore sur 22) → wait_for port durci →
#         set_fact durci → supprime la règle port 22 dans nftables
#
# Run 2+: SSH tourne déjà sur le port durci → même mécanique, idempotent
# ============================================================================
---
- name: Déploiement de la configuration SSH durcie
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    validate: '/usr/sbin/sshd -t -f %s'
  vars:
    ssh_user: "{{ vault_ssh_user }}"
    ssh_port: "{{ vault_ssh_port }}"
  register: _sshd_config

# --- Restart SSH : deux chemins selon le mode de connexion ---
#
# Mode laptop (SSH distant) : async pour ne pas tuer la connexion Ansible
# Mode CI (connection: local) : restart direct, Ansible ne passe pas par SSH
# Ne redémarre QUE si la config a changé (évite de couper la connexion pour rien)

- name: Redémarrer SSH (async — connexion encore sur port 22)
  systemd:
    name: sshd
    state: restarted
  async: 1
  poll: 0
  ignore_errors: true
  when:
    - _sshd_config is changed
    - ansible_connection | default('ssh') != 'local'

- name: Redémarrer SSH (mode local — pas de risque de coupure)
  systemd:
    name: sshd
    state: restarted
  when:
    - _sshd_config is changed
    - ansible_connection | default('ssh') == 'local'

- name: Attendre que SSH soit disponible sur le nouveau port (depuis le poste)
  wait_for:
    host: "{{ ansible_host }}"
    port: "{{ vault_ssh_port }}"
    delay: 3
    timeout: 30
  delegate_to: localhost
  vars:
    ansible_connection: local
  become: false
  when:
    - _sshd_config is changed
    - ansible_connection | default('ssh') != 'local'

- name: Attendre que SSH soit disponible sur le nouveau port (mode local)
  wait_for:
    host: "127.0.0.1"
    port: "{{ vault_ssh_port }}"
    delay: 3
    timeout: 30
  become: false
  when:
    - _sshd_config is changed
    - ansible_connection | default('ssh') == 'local'

# Maintenant que le port est confirmé, Ansible bascule dessus
- name: Mise à jour du port SSH pour la session Ansible en cours
  set_fact:
    ansible_port: "{{ vault_ssh_port }}"
  when: ansible_connection | default('ssh') != 'local'

# Fermer le port 22 dans nftables (bootstrap terminé)
# Le template nftables_conf.j2 conditionne le port 22 sur ssh_bootstrap_open.
# On pose un fact persistant et on re-génère le template sans le port 22.
- name: Créer le dossier facts.d
  file:
    path: /etc/ansible/facts.d
    state: directory
    owner: root
    mode: '0755'

- name: Désactiver le port 22 dans nftables (flag bootstrap terminé)
  copy:
    content: '{"ssh_bootstrap_open": false}'
    dest: /etc/ansible/facts.d/ssh_hardened.fact
    owner: root
    mode: '0644'
  when: vault_ssh_port | int != 22
  register: _ssh_bootstrap_flag

- name: Re-générer nftables.conf sans le port 22
  template:
    src: "{{ role_path }}/../system-vps/templates/nftables_conf.j2"
    dest: /etc/nftables.conf
    owner: root
    mode: '0644'
  vars:
    ssh_bootstrap_open: false
  when:
    - vault_ssh_port | int != 22
    - _ssh_bootstrap_flag is changed
  notify: Reload nftables
