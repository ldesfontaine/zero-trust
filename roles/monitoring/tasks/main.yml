# ============================================================================
# Monitoring — Maintenance images Docker + Grype scan CVE
#
# L'alerting (CPU, RAM, disk, containers, ZFS, TLS, backup) est geré
# intégralement par Bientôt (modules agent + alerts.yml + notifier Ntfy).
#
# Changements :
#   - Trivy retiré (compromission supply chain TeamPCP, mars 2026)
#   - Health-check.sh supprimé (remplacé par Bientôt)
#   - Dead man's switch supprimés (remplacés par Bientôt alerts.yml)
#   - Grype (Anchore) remplace Trivy pour le scan CVE
# ============================================================================
---

# === Nettoyage legacy ===

- name: Supprimer Trivy legacy (compromis supply chain mars 2026)
  ansible.builtin.file:
    path: /usr/local/bin/trivy
    state: absent

- name: Supprimer le cache Trivy
  ansible.builtin.file:
    path: /root/.cache/trivy
    state: absent

- name: Supprimer le script health-check legacy (remplacé par Bientôt)
  ansible.builtin.file:
    path: /usr/local/bin/health-check.sh
    state: absent

- name: Supprimer le cron health-check legacy
  ansible.builtin.cron:
    name: "alerting-health-check"
    state: absent

- name: Supprimer le répertoire d'état alerting legacy
  ansible.builtin.file:
    path: /var/lib/alerting
    state: absent

- name: Supprimer le cron dead man's switch backup legacy
  ansible.builtin.cron:
    name: "backup-deadman-switch"
    state: absent

- name: Supprimer le cron dead man's switch ZFS legacy
  ansible.builtin.cron:
    name: "zfs-snapshot-deadman"
    state: absent

# === Grype — scanner CVE images Docker (remplace Trivy) ===

- name: Installer Grype # noqa: risky-shell-pipe command-instead-of-module
  ansible.builtin.shell: |
    curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
  args:
    creates: /usr/local/bin/grype

# === Maintenance images Docker ===

- name: Déployer le script de maintenance des images Docker
  ansible.builtin.template:
    src: docker-image-maintenance.sh.j2
    dest: /opt/docker-image-maintenance.sh
    owner: root
    group: root
    mode: '0750'

- name: Cron hebdomadaire — maintenance des images Docker (dimanche 4h)
  ansible.builtin.cron:
    name: "docker-image-maintenance"
    minute: "0"
    hour: "{{ docker_maintenance_cron_hour }}"
    weekday: "{{ docker_maintenance_cron_weekday }}"
    job: "/opt/docker-image-maintenance.sh >> /var/log/docker-image-maintenance.log 2>&1"
    user: root

- name: Logrotate pour le log de maintenance
  ansible.builtin.copy:
    content: |
      /var/log/docker-image-maintenance.log {
        weekly
        rotate 4
        compress
        missingok
        notifempty
      }
    dest: /etc/logrotate.d/docker-image-maintenance
    mode: '0644'
