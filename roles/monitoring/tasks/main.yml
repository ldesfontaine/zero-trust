# ============================================================================
# Monitoring — Health checks + maintenance images Docker + Trivy
#
# Fusionne les anciens rôles alerting et image-maintenance.
# Déployé sur VPS ET Pi.
# Changements :
#   - curl Ntfy : Authorization Bearer partout
#   - Trivy : --format json + jq
#   - Seuil disk VPS : 80%
# ============================================================================
---

# --- Health checks ---
- name: Déployer le script de health-check
  template:
    src: health-check.sh.j2
    dest: /usr/local/bin/health-check.sh
    owner: root
    mode: '0750'

- name: Cron health-check
  cron:
    name: "alerting-health-check"
    minute: "*/{{ alerting_check_interval_min }}"
    job: "/usr/local/bin/health-check.sh 2>&1 | logger -t health-check"

# --- Dead man's switch backup ---
# Indépendant du script backup : si le cron backup ne tourne pas du tout
# (daemon down, disque full, crontab effacé), cette alerte se déclenche.
- name: Cron dead man's switch — alerte si aucun backup depuis 26h
  cron:
    name: "backup-deadman-switch"
    minute: "30"
    hour: "*/6"
    job: >-
      find {{ backup_status_dir | default('/mnt/tank/stack/backup/status') }}/vps-latest.json -mmin +1560 2>/dev/null | grep -q . &&
      curl -sf -H "Authorization: Bearer {{ vault_ntfy_auth_token }}"
      -H "Title: [$(hostname -s)] Backup manqué"
      -H "Tags: warning"
      -H "Priority: high"
      -d "Aucun backup exécuté depuis plus de 26h — vérifier le cron et le daemon."
      "{{ ntfy_server_url }}/{{ ntfy_alert_topic }}" || true
    user: root
  when: alerting_check_backup_vps | default(false) | bool

# --- Dead man's switch ZFS snapshots ---
# Vérifie que le dernier snapshot hourly a moins de 2h.
# Si le cron ZFS ne tourne pas, cette alerte se déclenche.
- name: Cron dead man's switch — alerte si snapshot ZFS hourly > 2h
  cron:
    name: "zfs-snapshot-deadman"
    minute: "15"
    hour: "*/2"
    job: >-
      LATEST=$(zfs list -t snapshot -o name -s creation -r {{ zfs_pool | default('tank') }} 2>/dev/null
      | grep autosnap-hourly | tail -1);
      [ -z "$LATEST" ] &&
      curl -sf -H "Authorization: Bearer {{ vault_ntfy_auth_token }}"
      -H "Title: [$(hostname -s)] Snapshot ZFS manqué"
      -H "Tags: warning"
      -H "Priority: high"
      -d "Aucun snapshot hourly trouvé sur {{ zfs_pool | default('tank') }}"
      "{{ ntfy_server_url }}/{{ ntfy_alert_topic }}" || true
    user: root
  when: alerting_check_zfs_snapshot | default(false) | bool

# --- Image maintenance ---
- name: Installer Trivy (scanner de vulnérabilités)
  shell: |
    curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  args:
    creates: /usr/local/bin/trivy

- name: Déployer le script de maintenance des images Docker
  template:
    src: docker-image-maintenance.sh.j2
    dest: /opt/docker-image-maintenance.sh
    owner: root
    group: root
    mode: '0750'

- name: Cron hebdomadaire — maintenance des images Docker (dimanche 4h)
  cron:
    name: "docker-image-maintenance"
    minute: "0"
    hour: "{{ docker_maintenance_cron_hour }}"
    weekday: "{{ docker_maintenance_cron_weekday }}"
    job: "/opt/docker-image-maintenance.sh >> /var/log/docker-image-maintenance.log 2>&1"
    user: root

- name: Logrotate pour le log de maintenance
  copy:
    content: |
      /var/log/docker-image-maintenance.log {
        weekly
        rotate 4
        compress
        missingok
        notifempty
      }
    dest: /etc/logrotate.d/docker-image-maintenance
    mode: '0644'
