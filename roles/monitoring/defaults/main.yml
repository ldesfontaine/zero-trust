---
# ============================================================================
# Monitoring — Variables par défaut
# Surcharger dans host_vars ou group_vars
# ============================================================================

# --- Ntfy ---
ntfy_server_url: "{{ vault_ntfy_server_url | default('https://ntfy.' + vault_base_domain) }}"
ntfy_alert_topic: "{{ vault_ntfy_alert_topic | default('alerts') }}"

# --- Seuils ---
alert_disk_critical_pct: 80
alert_ram_warning_pct: 85
alert_cpu_warning_pct: 90
alert_cpu_duration_min: 5
alert_backup_stale_hours: 48
alert_backup_usb_stale_days: 30
alert_tls_expire_days: 7

# --- Cron ---
alerting_check_interval_min: "5"

# --- Checks activés par machine ---
alerting_check_disk: true
alerting_check_ram: true
alerting_check_cpu: true
alerting_check_docker: true
alerting_check_backup_vps: false
alerting_check_backup_usb: false
alerting_check_zfs: false
