# ============================================================================
# NetBird DNS — Configuration du nameserver AdGuard via API NetBird
#
# Configure NetBird pour que tous les peers du mesh utilisent AdGuard
# comme DNS resolver → blocage pub sur toute la flotte
#
# L'API NetBird attend l'ID interne du groupe (UUID), pas son nom.
# Ce playbook récupère d'abord l'ID du groupe "All" puis l'utilise.
#
# Prérequis :
#   - vault_netbird_api_token dans host_vars/pi_serv.yml
#   - vault_pi_netbird_ip renseigné (IP WireGuard du Pi)
#   - AdGuard tourne sur {{ vault_pi_netbird_ip }}:5353
#
# Idempotent : vérifie si le nameserver existe avant de le créer
# ============================================================================
---
 
- name: Vérifier si le nameserver AdGuard existe déjà dans NetBird
  uri:
    url: "https://{{ netbird_fqdn }}/api/dns/nameservers"
    method: GET
    headers:
      Authorization: "Token {{ vault_netbird_api_token }}"
      Accept: "application/json"
    status_code: 200
    validate_certs: true
  register: netbird_dns_list
  delegate_to: localhost
  vars:
    ansible_connection: local
  become: false
  failed_when: false
  changed_when: false
  when: vault_pi_netbird_ip not in ["REMPLACER_APRES_ENROLEMENT_NETBIRD", "CHANGE_ME"]

- name: Déduire si l'API NetBird est joignable
  set_fact:
    netbird_api_reachable: "{{ (netbird_dns_list.status | default(-1)) == 200 }}"
  when: vault_pi_netbird_ip not in ["REMPLACER_APRES_ENROLEMENT_NETBIRD", "CHANGE_ME"]
 
- name: Vérifier si AdGuard est déjà configuré
  set_fact:
    adguard_dns_exists: >-
      {{
        netbird_dns_list.json | default([])
        | selectattr('nameservers', 'defined')
        | selectattr('nameservers', 'search', vault_pi_netbird_ip)
        | list | length > 0
      }}
  when:
    - vault_pi_netbird_ip not in ["REMPLACER_APRES_ENROLEMENT_NETBIRD", "CHANGE_ME"]
    - netbird_api_reachable | default(false)
 
# Récupère la liste des groupes pour trouver l'UUID du groupe "All"
# L'API NetBird n'accepte pas le nom, seulement l'ID interne
- name: Récupérer la liste des groupes NetBird
  uri:
    url: "https://{{ netbird_fqdn }}/api/groups"
    method: GET
    headers:
      Authorization: "Token {{ vault_netbird_api_token }}"
      Accept: "application/json"
    status_code: 200
    validate_certs: true
  register: netbird_groups
  delegate_to: localhost
  become: false
  when:
    - vault_pi_netbird_ip not in ["REMPLACER_APRES_ENROLEMENT_NETBIRD", "CHANGE_ME"]
    - netbird_api_reachable | default(false)
    - not (adguard_dns_exists | default(false))
 
- name: Extraire l'ID du groupe All
  set_fact:
    netbird_all_group_id: >-
      {{
        netbird_groups.json
        | selectattr('name', 'equalto', 'All')
        | map(attribute='id')
        | first
      }}
  delegate_to: localhost
  become: false
  when:
    - vault_pi_netbird_ip not in ["REMPLACER_APRES_ENROLEMENT_NETBIRD", "CHANGE_ME"]
    - netbird_api_reachable | default(false)
    - not (adguard_dns_exists | default(false))
 
- name: Configurer AdGuard comme DNS resolver dans NetBird
  uri:
    url: "https://{{ netbird_fqdn }}/api/dns/nameservers"
    method: POST
    headers:
      Authorization: "Token {{ vault_netbird_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "AdGuard-Pi"
      description: "AdGuard Home sur le Pi — blocage pub pour tous les peers"
      nameservers:
        - ip: "{{ vault_pi_netbird_ip }}"
          port: 5353
          ns_type: "udp"
      groups:
        - "{{ netbird_all_group_id }}"
      primary: true
      domains: []
      enabled: true
    status_code: 200
    validate_certs: true
  delegate_to: localhost
  become: false
  when:
    - vault_pi_netbird_ip not in ["REMPLACER_APRES_ENROLEMENT_NETBIRD", "CHANGE_ME"]
    - netbird_api_reachable | default(false)
    - not (adguard_dns_exists | default(false))
 
- name: "INFO — DNS NetBird"
  debug:
    msg: >
      {% if vault_pi_netbird_ip in ["REMPLACER_APRES_ENROLEMENT_NETBIRD", "CHANGE_ME"] %}
      DNS NetBird non configuré — enrollment NetBird requis d'abord.
      Relancer Ansible après enrollment pour configurer AdGuard comme DNS.
      {% elif not (netbird_api_reachable | default(false)) %}
      API NetBird injoignable — vérifier que le serveur NetBird est up et accessible.
      Relancer Ansible après avoir validé l'accès à https://{{ netbird_fqdn }}.
      {% else %}
      AdGuard configuré comme DNS resolver NetBird sur {{ vault_pi_netbird_ip }}:5353
      Tous les peers du mesh utilisent le blocage pub AdGuard.
      {% endif %}