# Valeurs par defaut du role base
# Peuvent etre surchargees dans host_vars/<machine>.yml

# --- SSH ---
base_ssh_port: 2222

# --- Utilisateurs ---
base_admin_user: "lucas"
base_deploy_user: "deploy"

# =========================================================================
# DNS — serveurs utilises par le host pour la resolution
# =========================================================================
# IMPORTANT : doit etre coherent avec base_nftables_output_allow.
# Si tu changes ces IPs, mets a jour egalement les regles nftables
# qui autorisent les requetes DNS sortantes.
base_dns_servers:
  - "9.9.9.9"     # Quad9 (primary)
  - "1.1.1.1"     # Cloudflare (fallback)

# --- Paquets systeme ---
base_packages:
  - curl
  - wget
  - jq
  - unattended-upgrades
  - nftables
  # Debian 13+ ne livre plus rsyslog par defaut (journald seul).
  # Installe pour generer /var/log/auth.log (consomme par CrowdSec
  # via le parser crowdsecurity/sshd). Sans ca, l'engine taile un
  # fichier absent et ne detecte aucune tentative SSH.
  - rsyslog

# --- Firewall (nftables) ---
# Regles output supplementaires, surchargees dans host_vars par machine
# Format : liste de dict { dest: "IP ou CIDR", port: PORT, proto: "tcp|udp" }
#
# Exemple dans host_vars/vps.yml :
#   base_nftables_output_allow:
#     - { dest: "9.9.9.9", port: 53, proto: "udp" }
#     - { dest: "0.0.0.0/0", port: 443, proto: "tcp" }
base_nftables_output_allow: []

# Ports TCP ouverts en input (en plus de SSH qui est toujours ouvert)
# Surchargeable dans host_vars pour le VPS (80, 443, 3478)
base_nftables_input_tcp_allow: []

# Ports UDP ouverts en input
base_nftables_input_udp_allow: []

# Mesh NetBird — autorise le trafic sur wt0 dans nftables
# Activer quand NetBird est deploye sur la machine
base_nftables_enable_mesh: false

# Autoriser l'output host -> bridges Docker (docker0 + br-*).
# Necessaire quand un process host doit joindre un service expose par un
# container via docker-proxy : docker-proxy accepte sur 127.0.0.1:PORT puis
# ouvre une NOUVELLE connexion vers le bridge IP du container (172.x.x.x).
# Cette 2e connexion traverse le chain output -> policy drop sans ce flag.
# Cas d'usage actuel : crowdsec-firewall-bouncer (host) -> LAPI (container).
base_nftables_output_docker_bridges: false
