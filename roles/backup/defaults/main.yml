---
# ============================================================================
# Backup — Variables internes
# Les rétentions, feature flags et cron sont dans group_vars/all.yml
# et host_vars/pi_serv.yml (source de vérité unique).
# ============================================================================

# --- Pool ZFS ---
zfs_pool: "tank" # noqa: var-naming[no-role-prefix]

# --- Répertoires (dérivés, rarement modifiés) ---
backup_base_dir: "/mnt/tank/stack/backup"
backup_status_dir: "{{ backup_base_dir }}/status"
backup_staging_dir: "{{ backup_base_dir }}/staging"
backup_log_dir: "/var/log/backup"

# --- Backup VPS (destinations dérivées) ---
backup_vps_dest_host: "{{ vault_vps_netbird_ip }}"
backup_vps_dest_dir: "/opt/backups/brain-01"
backup_vps_dest_user: "{{ vault_ssh_user }}"
backup_vps_gpg_recipient: "backup@{{ vault_base_domain }}"

# --- Backup USB (config physique) ---
backup_usb_luks_uuid: ""
backup_usb_mount_point: "/mnt/backup-usb"

# --- Notifications Ntfy (fallback si pas de variable vault) ---
ntfy_backup_topic: "{{ vault_ntfy_backup_topic | default('backup') }}" # noqa: var-naming[no-role-prefix]
ntfy_server_url: "{{ vault_ntfy_server_url | default('https://ntfy.' + vault_base_domain) }}" # noqa: var-naming[no-role-prefix]
