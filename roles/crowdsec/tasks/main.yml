# ============================================================
# Failsafe : le role crowdsec ne s'utilise PAS directement.
# Il s'appelle toujours avec tasks_from explicite :
#   - include_role: { name: crowdsec, tasks_from: engine.yml }
#   - include_role: { name: crowdsec, tasks_from: bouncer.yml }  # Phase 2
# Voir roles/crowdsec/README.md.
# ============================================================

- name: "Crowdsec — Appel direct du role non supporte"
  ansible.builtin.fail:
    msg: >-
      Le role crowdsec s'utilise avec tasks_from explicite :
        - include_role: { name: crowdsec, tasks_from: engine.yml }
        - include_role: { name: crowdsec, tasks_from: bouncer.yml }
      Voir roles/crowdsec/README.md.
