# ============================================================================
# Stack VPS — CrowdSec, Ntfy, Node Exporter (L4)
#
# Traefik et NetBird server sont dans la stack backbone (/opt/backbone/, L3).
# Cette stack rejoint le reseau sentinel_net (external) cree par le backbone.
# ============================================================================
---
- name: Creer les dossiers de la stack VPS
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vault_ssh_user }}"
    group: "{{ vault_ssh_user }}"
    mode: '0755'
  loop:
    - "{{ stack_dir }}"
    - "{{ stack_dir }}/crowdsec"
    - "{{ stack_dir }}/crowdsec/config"
    - "{{ stack_dir }}/crowdsec/config/notifications"
    - "{{ stack_dir }}/ntfy"
    - "{{ stack_dir }}/ntfy/cache"
    - "{{ stack_dir }}/ntfy/etc"

- name: Deployer les configurations (Templates)
  template:
    src: "{{ item.src }}"
    dest: "{{ stack_dir }}/{{ item.dest }}"
    owner: "{{ vault_ssh_user }}"
    mode: '0644'
  loop:
    - { src: 'docker-compose_vps_yml.j2',    dest: 'docker-compose.yml' }
    - { src: 'acquis_yaml.j2',               dest: 'acquis.yaml' }
  notify: Reload Docker Stack VPS

# ── Prometheus CrowdSec ─────────────────────────────────────────────────────
# Déployé AVANT docker compose up pour que CrowdSec le lise dès le 1er run.
- name: Déployer config.yaml.local (prometheus CrowdSec activé sur 0.0.0.0)
  copy:
    content: |
      prometheus:
        enabled: true
        level: full
        listen_addr: 0.0.0.0
        listen_port: 6060
    dest: "{{ stack_dir }}/crowdsec/config/config.yaml.local"
    owner: "{{ vault_ssh_user }}"
    mode: '0644'
  notify: Restart CrowdSec

# Note : notification CrowdSec → VictoriaMetrics supprimée (Bientôt gère le monitoring)

- name: Lancement de la Stack VPS
  shell: "cd {{ stack_dir }} && docker compose pull && docker compose up -d --remove-orphans"

# ── Hub CrowdSec ────────────────────────────────────────────────────────────
- name: Mise à jour des parsers et scénarios CrowdSec (hub update + upgrade)
  shell: |
    docker exec crowdsec cscli hub update && \
    docker exec crowdsec cscli hub upgrade --force
  changed_when: false
  retries: 5
  delay: 15
  register: hub_result
  until: hub_result.rc == 0
