# ============================================================================
# Système Pi — Mise à jour, outils, firewall
#
# Philosophie : le Pi n'est PAS exposé sur internet.
# UFW n'ouvre que le SSH (port custom) et le WireGuard NetBird.
# AdGuard DNS (port 53) est géré via UFW sur l'interface NetBird (wt0)
# uniquement — voir task dédiée dans netbird_client.yml après enrollment.
# ============================================================================
 
- name: Mettre à jour le cache apt
  apt:
    update_cache: yes
    cache_valid_time: 3600
 
- name: Mettre à jour tous les paquets
  apt:
    upgrade: safe
  environment:
    NEEDRESTART_MODE: "a"

- name: Réinitialiser la connexion SSH après apt upgrade (sshd potentiellement redémarré)
  meta: reset_connection

- name: Installer les outils de base
  apt:
    name:
      - curl
      - ufw
      - python3-pip
      - git
      - gnupg
      - unattended-upgrades
      - apt-listchanges
    state: present
 
# --- Désactivation avahi-daemon ---
# avahi occupe le port 5353/udp (mDNS) — conflit avec AdGuard Home
# qui écoute sur ce port hôte pour éviter le conflit avec NetBird DNS port 53
- name: Désactiver avahi-daemon (libère le port 5353/udp pour AdGuard)
  systemd:
    name: avahi-daemon
    state: stopped
    enabled: no
  ignore_errors: true
 
- name: Désactiver avahi-daemon socket
  systemd:
    name: avahi-daemon.socket
    state: stopped
    enabled: no
  ignore_errors: true
 
- name: Activer les mises à jour automatiques
  copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'
 
- name: Configurer les sources des mises à jour automatiques
  copy:
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}";
        "${distro_id}:${distro_codename}-security";
        "${distro_id}ESMApps:${distro_codename}-apps-security";
        "${distro_id}ESM:${distro_codename}-infra-security";
        "Docker:${distro_codename}";
      };
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: '0644'
 
# --- Firewall UFW Pi ---
# Seul le SSH custom est ouvert globalement.
# NetBird (WireGuard) gère lui-même son port via le kernel, pas UFW.
# Le port 53 AdGuard sera restreint à l'interface wt0 manuellement
# après l'enrollment NetBird (vault_pi_netbird_ip doit être connu).
- name: UFW - Autoriser SSH (port custom)
  ufw:
    rule: allow
    port: "{{ vault_pi_ssh_port | string }}"
    proto: tcp
 
# AdGuard DNS écoute sur 0.0.0.0:53 pour éviter le conflit avec NetBird DNS
# UFW bloque le port 53 depuis l'extérieur — seul le réseau NetBird peut y accéder
- name: UFW - Bloquer DNS depuis l'extérieur (AdGuard protégé par NetBird)
  ufw:
    rule: deny
    port: "53"
    proto: any