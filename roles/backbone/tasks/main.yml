# ============================================================================
# Backbone — Traefik reverse proxy + NetBird server (L3)
#
# Fusionne les anciens rôles traefik (L3a) et netbird-server (L3b).
# Déploie la stack complète dans /opt/backbone/ sur sentinel_net.
# ============================================================================
---

# -- Réseau partagé sentinel_net (idempotent) --------------------------------
- name: Créer le réseau Docker sentinel_net
  community.docker.docker_network:
    name: sentinel_net
    driver: bridge
    state: present

# -- Arborescence backbone ---------------------------------------------------
- name: Créer les dossiers backbone
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vault_ssh_user }}"
    group: "{{ vault_ssh_user }}"
    mode: '0755'
  loop:
    - "{{ backbone_dir }}"
    - "{{ backbone_dir }}/traefik"
    - "{{ backbone_dir }}/traefik/letsencrypt"
    - "{{ backbone_dir }}/traefik/dynamic"
    - "{{ backbone_dir }}/netbird"
    - "{{ backbone_dir }}/netbird/data"

# -- Migration volumes (VPS existant uniquement) -----------------------------
- name: Vérifier si l'ancien acme.json existe dans /opt/stack # noqa: var-naming[no-role-prefix]
  ansible.builtin.stat:
    path: "/opt/stack/traefik/acme.json"
  register: old_acme_json

- name: Sauvegarder acme.json depuis l'ancienne stack
  ansible.builtin.copy:
    src: "/opt/stack/traefik/acme.json"
    dest: "{{ backbone_dir }}/traefik/acme.json.migrated"
    remote_src: true
    owner: "{{ vault_ssh_user }}"
    mode: '0600'
  when: old_acme_json.stat.exists

- name: Vérifier si les anciennes données NetBird existent # noqa: var-naming[no-role-prefix]
  ansible.builtin.stat:
    path: "/opt/stack/netbird/data"
  register: old_netbird_data

- name: Vérifier si la migration NetBird a déjà été faite # noqa: var-naming[no-role-prefix]
  ansible.builtin.stat:
    path: "{{ backbone_dir }}/netbird/data/.migrated"
  register: netbird_migration_done

- name: Migrer les données NetBird depuis l'ancienne stack
  ansible.builtin.shell: "cp -a /opt/stack/netbird/data/* {{ backbone_dir }}/netbird/data/ && touch {{ backbone_dir }}/netbird/data/.migrated"
  changed_when: false
  when:
    - old_netbird_data.stat.exists and old_netbird_data.stat.isdir
    - not netbird_migration_done.stat.exists

- name: Corriger les permissions des données migrées
  ansible.builtin.file:
    path: "{{ backbone_dir }}/netbird/data"
    owner: "{{ vault_ssh_user }}"
    group: "{{ vault_ssh_user }}"
    recurse: true
  when: old_netbird_data.stat.exists and old_netbird_data.stat.isdir

# -- Templates ---------------------------------------------------------------
- name: Déployer la config dynamique Traefik (services Pi)
  ansible.builtin.template:
    src: "traefik-services.yml.j2"
    dest: "{{ backbone_dir }}/traefik/dynamic/pi-public.yml"
    owner: "{{ vault_ssh_user }}"
    mode: '0644'
  notify: Reload Backbone Stack

- name: Déployer la config NetBird server # noqa: var-naming[no-role-prefix]
  ansible.builtin.template:
    src: "netbird_config_yaml.j2"
    dest: "{{ backbone_dir }}/netbird_config.yaml"
    owner: "{{ vault_ssh_user }}"
    mode: '0644'
  register: _nb_config
  notify: Reload Backbone Stack

- name: Déployer le docker-compose backbone (Traefik + NetBird) # noqa: var-naming[no-role-prefix]
  ansible.builtin.template:
    src: "docker-compose.backbone.yml.j2"
    dest: "{{ backbone_dir }}/docker-compose.yml"
    owner: "{{ vault_ssh_user }}"
    mode: '0644'
  register: _nb_compose
  notify: Reload Backbone Stack

# -- Lancement ---------------------------------------------------------------
- name: Vérifier l'état actuel des containers backbone
  ansible.builtin.shell: "cd {{ backbone_dir }} && docker compose ps --format json"
  register: _backbone_ps
  changed_when: false
  check_mode: false

- name: Lancer la stack backbone (Traefik + NetBird)
  ansible.builtin.shell: "cd {{ backbone_dir }} && docker compose up -d --remove-orphans"
  register: _backbone_up
  changed_when: >-
    'Started' in _backbone_up.stderr
    or 'Created' in _backbone_up.stderr
  when: >-
    _backbone_ps.stdout == ''
    or 'exited' in _backbone_ps.stdout | lower
    or _nb_compose is changed
    or _nb_config is changed

# -- Validation NetBird ------------------------------------------------------
- name: Valider l'API management NetBird (local, sans TLS) # noqa: var-naming[no-role-prefix]
  ansible.builtin.uri:
    url: "http://127.0.0.1:33080/api/accounts"
    status_code: [200, 401, 403]
  register: netbird_api_check
  retries: 10
  delay: 5
  until: netbird_api_check.status in [200, 401, 403]
  failed_when: false
  when: not ansible_check_mode

- name: Échec si NetBird management API injoignable
  ansible.builtin.fail:
    msg: >
      NetBird management API injoignable sur http://127.0.0.1:33080/api/accounts
      après 10 tentatives. Vérifier : docker logs netbird-server
  when:
    - not ansible_check_mode
    - netbird_api_check.status is not defined or netbird_api_check.status not in [200, 401, 403]
