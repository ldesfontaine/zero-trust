# ============================================================================
# Run 1 : SSH tourne sur 22 → déploie sshd_config (port 2223) →
#         restart async → wait_for port 2223 → set_fact 2223 →
#         active UFW → ferme port 22
#
# Run 2+: SSH tourne déjà sur 2223 → idempotent
# ============================================================================
---
- name: Autoriser le port SSH final dans UFW
  ufw:
    rule: allow
    port: "{{ vault_pi_ssh_port | string }}"
    proto: tcp

- name: Déploiement de la configuration SSH durcie
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    validate: '/usr/sbin/sshd -t -f %s'
  vars:
    ssh_user: "{{ vault_pi_ssh_user }}"
    ssh_port: "{{ vault_pi_ssh_port }}"

# Restart async : connexion Ansible encore sur port 22
- name: Redémarrer SSH (async — connexion encore sur port 22)
  systemd:
    name: sshd
    state: restarted
  async: 1
  poll: 0
  ignore_errors: true

# Attend depuis localhost que SSH réponde sur le nouveau port
- name: Attendre que SSH soit disponible sur le nouveau port
  wait_for:
    host: "{{ ansible_host }}"
    port: "{{ vault_pi_ssh_port }}"
    delay: 3
    timeout: 30
  delegate_to: localhost
  become: false

# Ansible bascule sur le nouveau port
- name: Mise à jour du port SSH pour la session Ansible en cours
  set_fact:
    ansible_port: "{{ vault_pi_ssh_port }}"

# UFW activé ICI — SSH tourne déjà sur le port durci, Ansible déjà basculé
- name: Activer UFW
  ufw:
    state: enabled

# Port 22 fermé après activation UFW — SSH est déjà sur le port durci
- name: Supprimer la règle UFW autorisant le port 22 (bootstrap)
  ufw:
    rule: allow
    port: "22"
    proto: tcp
    delete: yes
  when: vault_pi_ssh_port | int != 22
