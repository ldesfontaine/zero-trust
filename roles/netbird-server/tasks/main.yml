# ============================================================================
# NetBird Server + Dashboard — Mesh backbone (L3b)
#
# Ajoute netbird-server et netbird-dashboard au compose backbone.
# Deploie la config YAML du serveur.
# Valide la connectivite gRPC apres demarrage.
#
# Prerequis : le role traefik (L3a) a deja cree sentinel_net et lance Traefik.
# ============================================================================
---

# -- Arborescence ------------------------------------------------------------
- name: Creer les dossiers NetBird server
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vault_ssh_user }}"
    group: "{{ vault_ssh_user }}"
    mode: '0755'
  loop:
    - "{{ backbone_dir }}/netbird"
    - "{{ backbone_dir }}/netbird/data"

# -- Migration donnees (VPS existant uniquement) -----------------------------
- name: Verifier si les anciennes donnees NetBird existent
  stat:
    path: "/opt/stack/netbird/data"
  register: old_netbird_data

- name: Migrer les donnees NetBird depuis l'ancienne stack
  shell: "cp -a /opt/stack/netbird/data/* {{ backbone_dir }}/netbird/data/"
  when: old_netbird_data.stat.exists and old_netbird_data.stat.isdir

- name: Corriger les permissions des donnees migrees
  file:
    path: "{{ backbone_dir }}/netbird/data"
    owner: "{{ vault_ssh_user }}"
    group: "{{ vault_ssh_user }}"
    recurse: true
  when: old_netbird_data.stat.exists and old_netbird_data.stat.isdir

# -- Templates ---------------------------------------------------------------
- name: Deployer la config NetBird server
  template:
    src: "netbird_config_yaml.j2"
    dest: "{{ backbone_dir }}/netbird_config.yaml"
    owner: "{{ vault_ssh_user }}"
    mode: '0644'
  register: _nb_config
  notify: Reload Backbone Stack

- name: Deployer le docker-compose backbone (Traefik + NetBird)
  template:
    src: "docker-compose.backbone.yml.j2"
    dest: "{{ backbone_dir }}/docker-compose.yml"
    owner: "{{ vault_ssh_user }}"
    mode: '0644'
  register: _nb_compose
  notify: Reload Backbone Stack

# -- Lancement ---------------------------------------------------------------
# Pas de "pull" ici : les images sont pull au premier lancement ou
# quand le compose change (handler). Pull systematique recree les
# containers et coupe le tunnel WireGuard du Pi pendant la reconnexion.
- name: Verifier l'etat actuel des containers backbone
  shell: "cd {{ backbone_dir }} && docker compose ps --format json"
  register: _backbone_ps
  changed_when: false
  check_mode: false

- name: Lancer la stack backbone (Traefik + NetBird)
  shell: "cd {{ backbone_dir }} && docker compose up -d --remove-orphans"
  register: _backbone_up
  changed_when: >-
    'Started' in _backbone_up.stderr
    or 'Created' in _backbone_up.stderr
  when: >-
    _backbone_ps.stdout == ''
    or 'exited' in _backbone_ps.stdout | lower
    or _nb_compose is changed
    or _nb_config is changed

# -- Validation gRPC ---------------------------------------------------------
# Ignoree en check mode : le stack n'est pas demarré, les ports sont fermes.
- name: Attendre le port gRPC NetBird (33073/tcp)
  wait_for:
    port: 33073
    host: 127.0.0.1
    timeout: 60
    state: started
  when: not ansible_check_mode

- name: Valider l'API management NetBird (local, sans TLS)
  uri:
    url: "http://127.0.0.1:33080/api/accounts"
    status_code: [200, 401, 403]
  register: netbird_api_check
  retries: 10
  delay: 5
  until: netbird_api_check.status in [200, 401, 403]
  failed_when: false
  when: not ansible_check_mode

- name: Echec si NetBird management API injoignable
  fail:
    msg: >
      NetBird management API injoignable sur http://127.0.0.1:33080/api/accounts
      apres 10 tentatives. Verifier : docker logs netbird-server
  when:
    - not ansible_check_mode
    - netbird_api_check.status is not defined or netbird_api_check.status not in [200, 401, 403]
