# ============================================================================
# Playbook principal — Déploiement complet (VPS + Pi)
# Usage : ansible-playbook -i inventory.ini setup.yml
#
#   Run 1 (machines vierges) :
#     Play 1 — Bootstrap VPS  : root:22 (password OVH) → crée lucas, injecte clé SSH
#     Play 2 — Sentinelle VPS : détecte port 22 ou 2222 → système, hardening,
#                               Docker, stack, NetBird client, CrowdSec bouncer
#     Play 3 — Bootstrap Pi   : admin:22 (password Pi) → crée lucas, injecte clé SSH
#     Play 4 — Cerveau Pi     : détecte port 22 ou 2223 → système, hardening,
#                               Docker, NetBird client, stack
#
#   Run 2+ (machines déjà configurées) :
#     Play 1 — ignore_unreachable (root désactivé) → ignoré silencieusement
#     Play 2 — détecte port 2222 → idempotent
#     Play 3 — ignore_unreachable (password auth désactivé) → ignoré silencieusement
#     Play 4 — détecte port 2223 → idempotent
#     Phase 6 — configure AdGuard comme DNS resolver dans NetBird
#     Phase 7 — configure les DNS rewrites dans AdGuard (services Pi privés)
# ============================================================================
---

# ============================================================
# PLAY 1 — Bootstrap VPS
# ============================================================
- name: "Bootstrap VPS — Création de l'utilisateur admin"
  hosts: vps
  become: true
  gather_facts: false
  ignore_unreachable: true
  vars:
    ansible_user: root
    ansible_password: "{{ vault_ssh_password }}"
    ansible_port: 22

  tasks:
    - name: "Bootstrap VPS : Création de l'utilisateur lucas"
      user:
        name: "{{ vault_ssh_user }}"
        shell: /bin/bash
        groups: sudo
        append: yes

    - name: "Bootstrap VPS : Sudo sans mot de passe pour lucas"
      copy:
        content: "{{ vault_ssh_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ vault_ssh_user }}"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    - name: "Bootstrap VPS : Injection de la clé SSH publique"
      ansible.posix.authorized_key:
        user: "{{ vault_ssh_user }}"
        state: present
        key: "{{ lookup('file', ssh_key_path) }}"


# ============================================================
# PLAY 2 — Déploiement VPS (Sentinelle)
# ============================================================
- name: "Déploiement de la Sentinelle (VPS)"
  hosts: vps
  become: true
  gather_facts: false
  ignore_unreachable: true
  vars:
    ansible_user: "{{ vault_ssh_user }}"
    ansible_port: 22
    ansible_ssh_private_key_file: "{{ priv_ssh_key_path }}"

  tasks:
    - name: "Détecter le port SSH actif ({{ vault_ssh_port }} ou 22)"
      wait_for:
        host: "{{ ansible_host }}"
        port: "{{ vault_ssh_port }}"
        timeout: 5
      delegate_to: localhost
      ignore_errors: true
      register: ssh_port_hardened
      become: false

    - name: "Basculer sur le port SSH durci si disponible"
      set_fact:
        ansible_port: "{{ vault_ssh_port if not ssh_port_hardened.failed else 22 }}"

    - name: "Re-gather facts avec le bon port"
      setup:

    - name: "Phase 1 : Système & Firewall VPS"
      include_tasks: tasks/system_vps.yml

    - name: "Phase 2 : Durcissement SSH"
      include_tasks: tasks/hardening.yml

    - name: "Phase 3 : Installation Docker Engine"
      include_tasks: tasks/docker.yml

    - name: "Phase 4 : Déploiement Stack VPS"
      include_tasks: tasks/stack_vps.yml

    - name: "Phase 4bis : Client NetBird (VPS comme peer du réseau)"
      include_tasks: tasks/netbird_client.yml

    - name: "Phase 5 : Bouncer CrowdSec"
      include_tasks: tasks/crowdsec_bouncer.yml

  handlers:
    - import_tasks: handlers/main.yml


# ============================================================
# PLAY 3 — Bootstrap Pi
# ============================================================
- name: "Bootstrap Pi — Création de l'utilisateur admin"
  hosts: pi
  become: true
  gather_facts: false
  ignore_unreachable: true
  vars:
    ansible_user: "{{ vault_pi_bootstrap_user }}"
    ansible_password: "{{ vault_pi_bootstrap_password }}"
    ansible_port: 22
    ansible_ssh_extra_args: "-o PreferredAuthentications=password -o PubkeyAuthentication=no"

  tasks:
    - name: "Bootstrap Pi : Création de l'utilisateur {{ vault_pi_ssh_user }}"
      user:
        name: "{{ vault_pi_ssh_user }}"
        shell: /bin/bash
        groups: sudo
        append: yes

    - name: "Bootstrap Pi : Sudo sans mot de passe pour {{ vault_pi_ssh_user }}"
      copy:
        content: "{{ vault_pi_ssh_user }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ vault_pi_ssh_user }}"
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    - name: "Bootstrap Pi : Injection de la clé SSH publique"
      ansible.posix.authorized_key:
        user: "{{ vault_pi_ssh_user }}"
        state: present
        key: "{{ lookup('file', ssh_key_path) }}"


# ============================================================
# PLAY 4 — Déploiement Pi (Cerveau)
# ============================================================
- name: "Déploiement du Cerveau (Pi)"
  hosts: pi
  become: true
  gather_facts: false
  ignore_unreachable: true
  vars:
    ansible_user: "{{ vault_pi_ssh_user }}"
    ansible_port: 22
    ansible_ssh_private_key_file: "{{ priv_ssh_key_path }}"

  tasks:
    - name: "Détecter le port SSH actif ({{ vault_pi_ssh_port }} ou 22)"
      wait_for:
        host: "{{ ansible_host }}"
        port: "{{ vault_pi_ssh_port }}"
        timeout: 5
      delegate_to: localhost
      ignore_errors: true
      register: ssh_port_hardened
      become: false

    - name: "Basculer sur le port SSH durci si disponible"
      set_fact:
        ansible_port: "{{ vault_pi_ssh_port if not ssh_port_hardened.failed else 22 }}"

    - name: "Re-gather facts avec le bon port"
      setup:

    - name: "Phase 1 : Système & Firewall Pi"
      include_tasks: tasks/system_pi.yml

    - name: "Phase 2 : Durcissement SSH"
      include_tasks: tasks/hardening_pi.yml

    - name: "Phase 3 : Installation Docker Engine"
      include_tasks: tasks/docker.yml

    - name: "Phase 4 : Client NetBird"
      include_tasks: tasks/netbird_client.yml

    - name: "Phase 5 : Déploiement Stack Pi"
      include_tasks: tasks/stack_pi.yml

    - name: "Phase 6 : Configuration DNS NetBird (AdGuard comme resolver mesh)"
      include_tasks: tasks/netbird_dns.yml

    - name: "Phase 7 : DNS Rewrites AdGuard (services Pi privés)"
      include_tasks: tasks/adguard_dns.yml

    - name: "Phase 8 : ACL NetBird Zero Trust"
      include_tasks: tasks/netbird_acl.yml

  handlers:
    - import_tasks: handlers/main.yml