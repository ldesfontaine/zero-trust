# ============================================================================
# Playbook principal — Déploiement complet (VPS + Pi)
# Usage : ansible-playbook -i inventory.ini setup.yml
#
# Importe les 4 playbooks dans l'ordre des layers :
#   1. bootstrap.yml    — L0 : création users admin (Run 0 uniquement)
#   2. infrastructure.yml — L1-L3 : système, hardening, Docker, mesh
#   3. services.yml     — L4 : stacks applicatives, CrowdSec
#   4. operations.yml   — L5 : backup ZFS, alerting Ntfy
#
# Chaque playbook peut aussi être exécuté indépendamment.
# ============================================================================
---

- import_playbook: playbooks/bootstrap.yml
- import_playbook: playbooks/infrastructure.yml
- import_playbook: playbooks/services.yml
- import_playbook: playbooks/operations.yml
